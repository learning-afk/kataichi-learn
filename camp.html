<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>线下集训营 · 卡泰驰培训中心</title>
<style>
:root{
  --pri:#F5A623;--pri-lt:#FFF3E0;--pri-dk:#E69500;
  --m4:#7C3AED;--m4-lt:#F3EEFF;--m4-dk:#6d28d9;
  --suc:#4CAF50;--err:#F44336;
  --bg:#F5F6FA;--card:#FFFFFF;
  --t1:#1A1A2E;--t2:#666680;--t3:#999AAA;
  --bd:#E8E8EF;--sh:0 2px 16px rgba(0,0,0,.06);
  --r:14px;--rs:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;
  background:var(--bg);min-height:100vh;color:var(--t1);
  -webkit-font-smoothing:antialiased;
}

/* 顶部彩条 */
.top-bar{height:4px;background:linear-gradient(90deg,#4F6EF7,var(--pri),#0D9488,var(--m4));position:fixed;top:0;left:0;right:0;z-index:100}

/* 导航 */
.nav{
  position:sticky;top:4px;z-index:99;background:#fff;
  border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:52px;
  box-shadow:0 1px 8px rgba(0,0,0,.05);
}
.nav-brand{display:flex;align-items:center;gap:10px}
.nav-logo{height:26px}
.nav-title{font-size:15px;font-weight:700;color:var(--t1)}
.nav-badge{background:var(--m4-lt);color:var(--m4);font-size:10px;font-weight:700;padding:2px 10px;border-radius:20px;letter-spacing:1px}
.nav-back{color:var(--t3);font-size:13px;text-decoration:none;display:flex;align-items:center;gap:4px;padding:6px 12px;border-radius:20px;transition:background .2s}
.nav-back:hover{background:var(--bg);color:var(--t1)}

/* Hero 区 */
.hero{
  background:linear-gradient(135deg,var(--m4) 0%,var(--m4-dk) 100%);
  padding:22px 20px;display:flex;align-items:center;gap:14px;
  position:relative;
}
.hero-text{flex:1;min-width:0}
.hero-label{color:rgba(255,255,255,.6);font-size:10px;font-weight:600;letter-spacing:2px;margin-bottom:2px}
.hero-title{color:#fff;font-size:20px;font-weight:800;line-height:1.2}
.hero-desc{color:rgba(255,255,255,.75);font-size:11px;line-height:1.5;margin-top:2px}

/* 统计栏 */
.stats-bar{
  background:#fff;border-bottom:1px solid var(--bd);
  display:flex;justify-content:center;gap:0;
}
.stat-item{
  flex:1;max-width:160px;padding:16px 12px;text-align:center;
  border-right:1px solid var(--bd);
}
.stat-item:last-child{border-right:none}
.stat-num{font-size:22px;font-weight:900;color:var(--m4)}
.stat-lbl{font-size:11px;color:var(--t3);margin-top:2px}

/* 主体 */
.main{max-width:780px;margin:0 auto;padding:32px 20px 60px}

/* 空状态 */
.empty{
  text-align:center;padding:60px 20px;
  background:var(--card);border-radius:var(--r);
  border:2px dashed var(--bd);
}
.empty-icon{font-size:52px;margin-bottom:16px}
.empty-title{font-size:16px;font-weight:700;color:var(--t2);margin-bottom:8px}
.empty-desc{font-size:13px;color:var(--t3);line-height:1.8}

/* 文章卡片列表 */
.article-list{display:flex;flex-direction:column;gap:16px}

/* 置顶标签 + 最新标签 */
.badge-top{background:#FEE2E2;color:#DC2626;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px}
.badge-new{background:var(--pri-lt);color:var(--pri-dk);font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px}
.badge-cat{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px}
.badge-sales{background:#EEF2FF;color:#4F6EF7}
.badge-tech{background:#ECFDF5;color:#065F46}
.badge-store{background:#FFF7ED;color:#C2410C}
.badge-all{background:var(--m4-lt);color:var(--m4)}

/* 大图卡（首条） */
.article-card-hero{
  background:var(--card);border-radius:var(--r);overflow:hidden;
  box-shadow:var(--sh);cursor:pointer;
  transition:transform .3s,box-shadow .3s;
  border:1px solid var(--bd);
}
.article-card-hero:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.1)}
.article-card-hero:active{transform:scale(.99)}
.card-cover{width:100%;aspect-ratio:16/7;object-fit:cover;background:linear-gradient(135deg,var(--m4-lt),var(--pri-lt));display:block}
.card-cover-placeholder{
  width:100%;aspect-ratio:16/7;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--m4-lt) 0%,var(--pri-lt) 100%);
  font-size:56px;color:var(--m4);opacity:.5;
}
.card-body{padding:20px 22px 22px}
.card-tags{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.card-title-big{font-size:20px;font-weight:800;color:var(--t1);line-height:1.4;margin-bottom:8px}
.card-excerpt{font-size:13px;color:var(--t2);line-height:1.7;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--t3)}
.card-meta-left{display:flex;align-items:center;gap:12px}
.card-read-more{
  display:inline-flex;align-items:center;gap:4px;
  color:var(--m4);font-weight:600;font-size:12px;
}
.card-read-more svg{width:13px;height:13px;transition:transform .2s}
.article-card-hero:hover .card-read-more svg{transform:translateX(3px)}

/* 小卡片 */
.article-card{
  background:var(--card);border-radius:var(--r);overflow:hidden;
  box-shadow:var(--sh);cursor:pointer;
  transition:transform .3s,box-shadow .3s;
  border:1px solid var(--bd);
  display:flex;align-items:stretch;gap:0;
}
.article-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.09)}
.article-card:active{transform:scale(.99)}
.ac-thumb{
  width:120px;flex-shrink:0;overflow:hidden;
}
.ac-thumb-img{width:100%;height:100%;object-fit:cover;display:block;background:linear-gradient(135deg,var(--m4-lt),var(--pri-lt))}
.ac-thumb-placeholder{
  width:100%;height:100%;min-height:90px;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--m4-lt),var(--pri-lt));
  font-size:32px;opacity:.6;
}
.ac-body{flex:1;padding:14px 16px;min-width:0;display:flex;flex-direction:column;justify-content:space-between}
.ac-tags{display:flex;gap:6px;margin-bottom:7px;flex-wrap:wrap}
.ac-title{font-size:15px;font-weight:700;color:var(--t1);line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ac-excerpt{font-size:12px;color:var(--t2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:8px}
.ac-meta{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--t3)}

/* ── 文章详情弹窗（公众号图文风格）── */
.article-modal{
  display:none;position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,.55);backdrop-filter:blur(4px);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.article-modal.show{display:block}
.article-wrap{
  max-width:680px;margin:20px auto;
  background:#fff;border-radius:16px;
  overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.25);
  min-height:60vh;
}
@media(max-width:680px){
  .article-wrap{margin:0;border-radius:0;min-height:100vh}
}

/* 弹窗头部（公众号风格） */
.aw-header{
  padding:20px 22px 0;
  border-bottom:1px solid var(--bd);
}
.aw-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.aw-brand{display:flex;align-items:center;gap:8px}
.aw-brand-logo{width:36px;height:36px;border-radius:50%;overflow:hidden;background:var(--m4-lt);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.aw-brand-logo img{width:100%;height:100%;object-fit:cover}
.aw-brand-name{font-size:13px;font-weight:700;color:var(--t1)}
.aw-brand-sub{font-size:11px;color:var(--t3)}
.aw-close-btn{
  width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;
  background:var(--bg);color:var(--t3);font-size:18px;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;flex-shrink:0;
}
.aw-close-btn:hover{background:var(--bd);color:var(--t1)}
.aw-meta-tags{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}

/* 文章主体 */
.aw-cover{width:100%;max-height:380px;object-fit:cover;display:block}
.aw-cover-placeholder{
  width:100%;height:220px;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--m4-lt) 0%,var(--pri-lt) 100%);
  font-size:64px;opacity:.5;
}
.aw-body{padding:26px 24px 40px}
.aw-title{font-size:24px;font-weight:900;color:var(--t1);line-height:1.4;margin-bottom:16px}
.aw-info-row{
  display:flex;align-items:center;gap:16px;
  font-size:12px;color:var(--t3);
  padding-bottom:18px;margin-bottom:18px;
  border-bottom:1px solid var(--bd);
  flex-wrap:wrap;
}
.aw-info-item{display:flex;align-items:center;gap:4px}
.aw-info-item svg{width:13px;height:13px;flex-shrink:0}

/* 富文本内容渲染区（公众号图文样式） */
.aw-content{
  font-size:15px;color:var(--t1);line-height:1.9;
  word-break:break-word;
}
.aw-content h2{
  font-size:18px;font-weight:800;color:var(--t1);
  margin:28px 0 12px;padding-left:14px;
  border-left:4px solid var(--m4);
}
.aw-content h3{
  font-size:15px;font-weight:700;color:var(--m4);
  margin:20px 0 8px;
}
.aw-content p{margin-bottom:14px;color:#333;line-height:1.9}
.aw-content strong{color:var(--t1);font-weight:700}
.aw-content em{color:var(--m4);font-style:normal;font-weight:600}
.aw-content ul,
.aw-content ol{padding-left:20px;margin-bottom:14px}
.aw-content li{margin-bottom:6px;color:#444;line-height:1.8}
.aw-content img{
  width:100%;border-radius:10px;margin:16px 0;
  box-shadow:0 4px 16px rgba(0,0,0,.1);display:block;
}
.aw-content blockquote{
  background:var(--m4-lt);border-left:4px solid var(--m4);
  padding:14px 18px;border-radius:0 10px 10px 0;
  margin:20px 0;font-size:14px;color:var(--m4-dk);font-weight:500;
}
.aw-content .highlight-box{
  background:var(--pri-lt);border:1px solid rgba(245,166,35,.3);
  border-radius:10px;padding:16px 18px;margin:20px 0;
}
.aw-content .highlight-box p{margin-bottom:0;color:#92400E}
.aw-content hr{border:none;border-top:1px solid var(--bd);margin:24px 0}

/* 图片画廊网格 */
.aw-gallery{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0;
}
.aw-gallery img{
  width:100%;aspect-ratio:1;object-fit:cover;
  border-radius:8px;cursor:pointer;margin:0;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}
.aw-gallery.cols-2{grid-template-columns:repeat(2,1fr)}
.aw-gallery.cols-1{grid-template-columns:1fr}
.aw-gallery.cols-1 img{aspect-ratio:16/9}

/* ── 互动区：分享 + 点赞 + 评论 ── */
.aw-interact{
  padding:20px 24px 28px;
  border-top:1px solid var(--bd);
}
/* 分享链接 */
.share-section{
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:16px 0 20px;
  border-bottom:1px solid var(--bd);
  margin-bottom:18px;
}
.share-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 22px;border-radius:30px;
  border:2px solid var(--m4);background:var(--m4);color:#fff;
  cursor:pointer;font-size:14px;
  transition:all .25s;user-select:none;
  font-family:inherit;font-weight:600;
}
.share-btn:hover{background:#6d28d9;border-color:#6d28d9;box-shadow:0 4px 16px rgba(124,58,237,.35)}
.share-btn:active{transform:scale(.96)}
/* 点赞区 */
.like-section{
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:16px 0 20px;
  border-bottom:1px solid var(--bd);
  margin-bottom:18px;
}
.like-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 22px;border-radius:30px;
  border:2px solid var(--bd);background:#fff;
  cursor:pointer;font-size:14px;color:var(--t2);
  transition:all .25s;user-select:none;
  font-family:inherit;
}
.like-btn:hover{border-color:var(--err);color:var(--err);background:#FFF5F5}
.like-btn:active{transform:scale(.96)}
.like-btn.liked{
  border-color:var(--err);background:var(--err);color:#fff;
  box-shadow:0 4px 16px rgba(244,67,54,.25);
}
.like-btn.liked:hover{background:#E53935;border-color:#E53935}
.like-icon{
  width:20px;height:20px;transition:transform .3s;
}
.like-btn.liked .like-icon{animation:heartBeat .4s ease}
@keyframes heartBeat{
  0%{transform:scale(1)}30%{transform:scale(1.35)}60%{transform:scale(.9)}100%{transform:scale(1)}
}
.like-count{font-weight:700;font-size:15px}

/* 评论区 */
.comment-section{}
.comment-title{
  font-size:14px;font-weight:700;color:var(--t1);
  margin-bottom:14px;display:flex;align-items:center;gap:6px;
}
.comment-title .cnt{color:var(--m4);font-weight:800}
.comment-form{
  display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;
}
.cf-name{
  width:100px;flex-shrink:0;
  padding:9px 12px;border:1px solid var(--bd);border-radius:8px;
  font-size:13px;color:var(--t1);outline:none;font-family:inherit;
  background:#fff;transition:border .2s;
}
.cf-name:focus{border-color:var(--m4)}
.cf-text{
  flex:1;min-width:160px;
  padding:9px 12px;border:1px solid var(--bd);border-radius:8px;
  font-size:13px;color:var(--t1);outline:none;font-family:inherit;
  background:#fff;resize:none;transition:border .2s;
}
.cf-text:focus{border-color:var(--m4)}
.cf-submit{
  flex-shrink:0;padding:9px 18px;
  background:var(--m4);color:#fff;border:none;border-radius:8px;
  font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;
  transition:all .2s;
}
.cf-submit:hover{background:var(--m4-dk)}
.cf-submit:active{transform:scale(.96)}
.cf-submit:disabled{opacity:.5;cursor:not-allowed}

/* 评论列表 */
.comment-list{display:flex;flex-direction:column;gap:14px}
.comment-item{
  display:flex;gap:10px;
}
.cm-avatar{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  background:var(--m4-lt);color:var(--m4);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;
}
.cm-body{flex:1;min-width:0}
.cm-header{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.cm-name{font-size:13px;font-weight:600;color:var(--t1)}
.cm-time{font-size:11px;color:var(--t3)}
.cm-text{font-size:13px;color:var(--t2);line-height:1.65;word-break:break-word}
.cm-empty{text-align:center;color:var(--t3);font-size:13px;padding:16px 0}

/* 提示 toast */
.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  background:var(--t1);color:#fff;padding:10px 24px;border-radius:20px;
  font-size:13px;z-index:3000;opacity:0;transition:opacity .3s;
  pointer-events:none;
}
.toast.show{opacity:1}

/* 底部分割线 */
.aw-footer{
  padding:20px 24px;border-top:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;
  background:var(--bg);
}
.aw-footer-brand{font-size:12px;color:var(--t3)}
.aw-footer-brand .b{color:var(--m4);font-weight:600}

/* 图片灯箱 */
.lightbox{
  display:none;position:fixed;inset:0;z-index:2000;
  background:rgba(0,0,0,.92);
  align-items:center;justify-content:center;
  cursor:zoom-out;
}
.lightbox.show{display:flex}
.lightbox img{max-width:92vw;max-height:88vh;border-radius:8px;object-fit:contain}

/* 响应式 */
@media(max-width:600px){
  .hero{padding:44px 18px 36px}
  .hero-title{font-size:24px}
  .main{padding:24px 16px 48px}
  .ac-thumb{width:96px}
  .aw-body{padding:18px 18px 32px}
  .aw-title{font-size:20px}
  .aw-gallery{gap:4px}
}
  </style>
</head>
<body>
<div class="top-bar"></div>

<!-- 导航 -->
<nav class="nav">
  <div class="nav-brand">
    <img class="nav-logo" src="logo.png" alt="卡泰驰">
    <span class="nav-title">线下集训营</span>
    <span class="nav-badge">MODULE 04</span>
  </div>
  <a class="nav-back" href="portal_v2.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    返回
  </a>
</nav>

<!-- Hero -->
<div class="hero">
  <div class="hero-text">
    <p class="hero-label">OFFLINE TRAINING</p>
    <h1 class="hero-title">线下集训营</h1>
    <p class="hero-desc">实战淬炼，名师带教 · 分岗位小班制，理实一体化</p>
  </div>
</div>

<!-- 统计栏 -->
<div class="stats-bar" id="statsBar">
  <div class="stat-item"><div class="stat-num" id="statTotal">0</div><div class="stat-lbl">累计期数</div></div>
  <div class="stat-item"><div class="stat-num" id="statPeople">0</div><div class="stat-lbl">参训人次</div></div>
  <div class="stat-item"><div class="stat-num" id="statDays">0</div><div class="stat-lbl">培训天数</div></div>
</div>

<!-- 主体 -->
<main class="main">
  <!-- 文章列表 -->
  <div id="articleList"></div>
</main>

<!-- 文章详情弹窗 -->
<div class="article-modal" id="articleModal" onclick="handleModalClick(event)">
  <div class="article-wrap" id="articleWrap">

    <div class="aw-header">
      <div class="aw-top">
        <div class="aw-brand">
          <div class="aw-brand-logo">
            <img src="logo.png" alt="卡泰驰" onerror="this.style.display='none'">
          </div>
          <div>
            <div class="aw-brand-name">卡泰驰培训中心</div>
            <div class="aw-brand-sub">卡泰驰 CARtech · 线下集训营</div>
          </div>
        </div>
        <button class="aw-close-btn" onclick="closeArticle()">×</button>
      </div>
      <div class="aw-meta-tags" id="awMetaTags"></div>
    </div>

    <div id="awCoverArea"></div>

    <div class="aw-body">
      <h1 class="aw-title" id="awTitle"></h1>
      <div class="aw-info-row" id="awInfoRow"></div>
      <div class="aw-content" id="awContent"></div>
    </div>

    <!-- 互动区：分享 + 点赞 + 评论 -->
    <div class="aw-interact">
      <!-- 分享链接 -->
      <div class="share-section">
        <button class="share-btn" onclick="copyArticleLink()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
          <span>复制链接</span>
        </button>
      </div>

      <!-- 点赞 -->
      <div class="like-section">
        <button class="like-btn" id="likeBtn" onclick="toggleLike()">
          <svg class="like-icon" id="likeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
          <span id="likeCount">0</span>
        </button>
      </div>

      <!-- 评论 -->
      <div class="comment-section">
        <div class="comment-title">💬 评论 <span class="cnt" id="commentCnt">0</span></div>
        <div class="comment-form">
          <input class="cf-name" id="cmName" placeholder="昵称" maxlength="12" autocomplete="off">
          <input class="cf-text" id="cmText" placeholder="写下你的想法..." maxlength="200">
          <button class="cf-submit" id="cmSubmit" onclick="submitComment()">发布</button>
        </div>
        <div class="comment-list" id="commentList"></div>
      </div>
    </div>

    <div class="aw-footer">
      <span class="aw-footer-brand">© 2026 <span class="b">卡泰驰 CARtech</span> · 培训中心</span>
    </div>
  </div>
</div>

<!-- 图片灯箱 -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="" alt="">
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── 数据存储键 ──
var STORAGE_KEY = 'kataichi_camp_articles';

// ── 分类配置 ──
var CAT_CONFIG = {
  all:   {label:'全部',   cls:'badge-all'},
  sales: {label:'销售特训', cls:'badge-sales'},
  tech:  {label:'技师特训', cls:'badge-tech'},
  store: {label:'管理特训', cls:'badge-store'},
};

function getCatBadge(cat) {
  var c = CAT_CONFIG[cat] || CAT_CONFIG.all;
  return '<span class="badge-cat ' + c.cls + '">' + c.label + '</span>';
}

// ── API 配置 ──
// 如果 camp.html 部署在 CloudStudio，而服务器运行在另一台机器上，
// 请设置为服务器的公网地址，例如：'http://your-server-ip:3000'
// 本地测试或同源部署时留空即可（使用相对路径）
var API_BASE = '';

// 解析资源 URL（自动拼接 API_BASE，并归一化路径）
function resolveUrl(url) {
  if (!url) return url;
  if (url.match(/^https?:\/\//i)) return url; // 已是绝对 URL
  // 去掉开头的 /（兼容服务端绝对路径）
  var clean = url.replace(/^\/+/, '');
  if (API_BASE) return API_BASE + '/' + clean;
  return clean;
}

// 处理正文 HTML 中的图片路径（归一化 + API_BASE拼接）
function processContent(html) {
  if (!html) return html;
  // 归一化：去掉 /uploads/ 开头的绝对路径
  html = html.replace(/src="\/uploads\//g, 'src="uploads/');
  html = html.replace(/src=\\"\/uploads\//g, 'src=\\"uploads/');
  // 如果有 API_BASE，拼接
  if (API_BASE) {
    html = html.replace(/src="uploads\//g, 'src="' + API_BASE + '/uploads/');
    html = html.replace(/src=\\"uploads\//g, 'src=\\"' + API_BASE + '/uploads/');
  }
  return html;
}

// ── 数据同步状态管理 ──
function showSyncBar() {
  var bar = document.getElementById('syncBar');
  if (bar) bar.style.display = 'flex';
}



// ── 读取文章（优先服务端 API，回退 camp-data.json）──
var _articlesCache = null;

function loadArticles(callback) {
  // 主数据源：camp-data.json（管理后台 sync 后自动更新的静态文件）
  // CloudStudio 和 localhost 均可用，不受服务端限制
  fetch('camp-data.json?t=' + Date.now())
    .then(function(r) { if (!r.ok) throw new Error('no static'); return r.json(); })
    .then(function(data) {
      // camp-data.json 为权威数据源：有数据用数据，无数据清空
      if (Array.isArray(data)) {
        _articlesCache = data;
        // 同步到 localStorage（含空数组清空旧缓存）
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
      } else {
        _articlesCache = [];
      }
      callback();
      // 后台尝试 API 获取更新数据（仅 localhost 环境有效）
      tryLoadFromAPI();
    })
    .catch(function() {
      // camp-data.json 不可用（网络错误），回退 localStorage
      var local = getLocalArticles();
      _articlesCache = (local && local.length > 0) ? local : [];
      callback();
    });
}

function tryLoadFromAPI() {
  fetch('/api/camp/articles?_t=' + Date.now())
    .then(function(r) { if (!r.ok) throw new Error('no api'); return r.json(); })
    .then(function(j) {
      if (j && j.ok && Array.isArray(j.data)) {
        // API 数据为权威：直接覆盖缓存（含空数组清空旧数据）
        _articlesCache = j.data;
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(j.data)); } catch(e) {}
        renderList(); // 静默刷新列表
      }
    })
    .catch(function() { /* API 不可用，保持 camp-data.json 数据 */ });
}

function getArticles() {
  if (_articlesCache) return _articlesCache;
  return getLocalArticles();
}

function getLocalArticles() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { return []; }
}

// ── 渲染文章列表 ──
function renderList() {
  var all = getArticles();
  // 按置顶+时间排序
  all.sort(function(a,b){
    if(a.top && !b.top) return -1;
    if(!a.top && b.top) return 1;
    return (b.date || '').localeCompare(a.date || '');
  });

  var list = all;

  // 更新统计
  var totalPeople = 0, totalDays = 0;
  all.forEach(function(a){ totalPeople += (parseInt(a.people)||0); totalDays += (parseInt(a.days)||0); });
  document.getElementById('statTotal').textContent = all.length;
  document.getElementById('statPeople').textContent = all.length ? totalPeople : '-';
  document.getElementById('statDays').textContent = all.length ? totalDays : '-';

  var el = document.getElementById('articleList');
  if (!list.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🏕️</div><div class="empty-title">暂无培训记录</div><div class="empty-desc">管理员可在后台发布线下集训营的培训内容</div></div>';
    return;
  }

  var h = '<div class="article-list">';
  list.forEach(function(a, i) {
    var isNew = isWithin30Days(a.date);
    if (i === 0) {
      // 大图卡（首条）
      h += '<div class="article-card-hero" onclick="openArticle(' + a.id + ')">';
      if (a.cover) {
        h += '<img class=\"card-cover\" src=\"' + escHtml(resolveUrl(a.cover)) + '\" alt=\"\" onerror=\"this.style.display=\\'none\\'\">';
      } else {
        h += '<div class="card-cover-placeholder">🏕️</div>';
      }
      h += '<div class="card-body">';
      h += '<div class="card-tags">';
      if (a.top) h += '<span class="badge-top">置顶</span>';
      if (isNew) h += '<span class="badge-new">最新</span>';
      h += getCatBadge(a.cat);
      h += '</div>';
      h += '<h2 class="card-title-big">' + escHtml(a.title) + '</h2>';
      if (a.excerpt) h += '<p class="card-excerpt">' + escHtml(a.excerpt) + '</p>';
      h += '<div class="card-meta">';
      h += '<div class="card-meta-left">';
      if (a.date) h += '<span>📅 ' + escHtml(a.date) + '</span>';
      if (a.location) h += '<span>📍 ' + escHtml(a.location) + '</span>';
      if (a.people) h += '<span>👥 ' + a.people + '人</span>';
      h += '</div>';
      h += '<span class="card-read-more">阅读全文 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg></span>';
      h += '</div></div></div>';
    } else {
      // 小卡片
      h += '<div class="article-card" onclick="openArticle(' + a.id + ')">';
      h += '<div class="ac-thumb">';
      if (a.cover) {
        h += '<img class="ac-thumb-img" src="' + escHtml(resolveUrl(a.cover)) + '" alt="" onerror="this.style.display=\'none\'">';
      } else {
        h += '<div class="ac-thumb-placeholder">🏕️</div>';
      }
      h += '</div><div class="ac-body">';
      h += '<div class="ac-tags">';
      if (a.top) h += '<span class="badge-top">置顶</span>';
      if (isNew) h += '<span class="badge-new">最新</span>';
      h += getCatBadge(a.cat);
      h += '</div>';
      h += '<div class="ac-title">' + escHtml(a.title) + '</div>';
      if (a.excerpt) h += '<div class="ac-excerpt">' + escHtml(a.excerpt) + '</div>';
      h += '<div class="ac-meta">';
      var metas = [];
      if (a.date) metas.push('📅 ' + escHtml(a.date));
      if (a.location) metas.push('📍 ' + escHtml(a.location));
      if (a.people) metas.push('👥 ' + a.people + '人');
      h += metas.join(' · ');
      h += '</div></div></div>';
    }
  });
  h += '</div>';
  el.innerHTML = h;
}

// ── 分享链接 ──
function updateHash(id) {
  var hash = 'article-' + id;
  if (window.location.hash !== '#' + hash) {
    history.replaceState(null, '', '#' + hash);
  }
}

function copyArticleLink() {
  if (!_currentArticleId) return;
  var url = window.location.origin + window.location.pathname + '#article-' + _currentArticleId;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(function(){
      showToast('链接已复制，可粘贴分享');
    }).catch(function(){
      fallbackCopy(url);
    });
  } else {
    fallbackCopy(url);
  }
}

function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';ta.style.left = '-9999px';ta.style.top = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); showToast('链接已复制，可粘贴分享'); } catch(e) { showToast('复制失败，请手动复制'); }
  document.body.removeChild(ta);
}

// ── URL Hash 路由 ──
function handleHashRoute() {
  var hash = window.location.hash;
  if (hash && hash.startsWith('#article-')) {
    var id = Number(hash.replace('#article-', ''));
    if (id) {
      // 等列表渲染完再开弹窗
      setTimeout(function(){ openArticle(id); }, 300);
    }
  }
}

// ── 打开文章详情 ──
function openArticle(id) {
  var articles = getArticles();
  var a = articles.find(function(x){ return x.id === id; });
  if (!a) return;

  // 头部标签
  var tagsH = '';
  if (a.top) tagsH += '<span class="badge-top">置顶</span>';
  tagsH += getCatBadge(a.cat);
  document.getElementById('awMetaTags').innerHTML = tagsH;

  // 封面
  var coverEl = document.getElementById('awCoverArea');
  if (a.cover) {
    coverEl.innerHTML = '<img class="aw-cover" src="' + escHtml(resolveUrl(a.cover)) + '" alt="" onerror="this.parentNode.innerHTML=\'<div class=\\\'aw-cover-placeholder\\\'>🏕️</div>\'">';
  } else {
    coverEl.innerHTML = '<div class="aw-cover-placeholder">🏕️</div>';
  }

  // 标题
  document.getElementById('awTitle').textContent = a.title || '';

  // 信息行
  var infoH = '';
  if (a.date) infoH += '<span class="aw-info-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>' + escHtml(a.date) + '</span>';
  if (a.location) infoH += '<span class="aw-info-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>' + escHtml(a.location) + '</span>';
  if (a.people) infoH += '<span class="aw-info-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>' + a.people + ' 人参训</span>';
  if (a.days) infoH += '<span class="aw-info-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' + a.days + ' 天培训</span>';
  document.getElementById('awInfoRow').innerHTML = infoH;

  // 正文（直接使用服务器返回的相对URL，自动适配）
  var content = a.content || '';
  document.getElementById('awContent').innerHTML = processContent(content);

  // 给正文内图片绑定灯箱
  document.querySelectorAll('#awContent img').forEach(function(img){
    img.style.cursor = 'zoom-in';
    img.onclick = function(e){ e.stopPropagation(); openLightbox(this.src); };
  });
  // 给画廊图片绑定灯箱
  document.querySelectorAll('.aw-gallery img').forEach(function(img){
    img.onclick = function(e){ e.stopPropagation(); openLightbox(this.src); };
  });

  // 渲染互动区
  renderInteractions(id);
  
  // 更新 URL hash（便于分享）
  updateHash(id);
  
  // 显示弹窗，滚到顶
  var modal = document.getElementById('articleModal');
  modal.classList.add('show');
  modal.scrollTop = 0;
  document.getElementById('articleWrap').scrollIntoView({behavior:'auto'});
  document.body.style.overflow = 'hidden';
}

function closeArticle() {
  document.getElementById('articleModal').classList.remove('show');
  document.body.style.overflow = '';
  // 清除 hash
  if (window.location.hash) {
    history.replaceState(null, '', window.location.pathname + window.location.search);
  }
}

function handleModalClick(e) {
  if (e.target === document.getElementById('articleModal')) closeArticle();
}

// ESC 关闭
document.addEventListener('keydown', function(e){ if(e.key==='Escape'){ closeLightbox(); closeArticle(); }});

// ── 灯箱 ──
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
  document.getElementById('lightboxImg').src = '';
}

// ── 工具函数 ──
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function isWithin30Days(dateStr) {
  if (!dateStr) return false;
  try {
    var d = new Date(dateStr.replace(/\//g,'-'));
    return (Date.now() - d.getTime()) < 30*24*3600*1000;
  } catch(e){ return false; }
}

// ── 互动功能：点赞 + 评论 ──
var INTERACT_KEY = 'kataichi_camp_interactions';
var _currentArticleId = null;
var _deviceId = null;

function getDeviceId() {
  if (_deviceId) return _deviceId;
  _deviceId = localStorage.getItem('kataichi_device_id');
  if (!_deviceId) {
    _deviceId = 'dev_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10);
    localStorage.setItem('kataichi_device_id', _deviceId);
  }
  return _deviceId;
}

function getAllInteractions() {
  try { return JSON.parse(localStorage.getItem(INTERACT_KEY) || '{}'); } catch(e) { return {}; }
}

function saveAllInteractions(data) {
  localStorage.setItem(INTERACT_KEY, JSON.stringify(data));
}

function getInteractions(articleId) {
  var all = getAllInteractions();
  var key = String(articleId);
  if (!all[key]) {
    all[key] = { likes: 0, likedBy: [], comments: [] };
  }
  return all[key];
}

function saveInteractions(articleId, data) {
  var all = getAllInteractions();
  all[String(articleId)] = data;
  saveAllInteractions(all);
}

function toggleLike() {
  if (!_currentArticleId) return;
  var data = getInteractions(_currentArticleId);
  var devId = getDeviceId();
  var idx = data.likedBy.indexOf(devId);
  if (idx >= 0) {
    // 取消点赞
    data.likedBy.splice(idx, 1);
    data.likes = Math.max(0, data.likes - 1);
  } else {
    // 点赞
    data.likedBy.push(devId);
    data.likes += 1;
  }
  saveInteractions(_currentArticleId, data);
  renderLikeBtn(data);
}

function submitComment() {
  if (!_currentArticleId) return;
  var nameEl = document.getElementById('cmName');
  var textEl = document.getElementById('cmText');
  var btnEl = document.getElementById('cmSubmit');
  var name = (nameEl.value || '').trim();
  var text = (textEl.value || '').trim();

  if (!name) { showToast('请输入昵称'); nameEl.focus(); return; }
  if (!text) { showToast('请输入评论内容'); textEl.focus(); return; }
  if (text.length > 200) { showToast('评论内容不能超过200字'); return; }

  btnEl.disabled = true;
  var data = getInteractions(_currentArticleId);
  data.comments.push({
    id: Date.now(),
    name: name.slice(0, 12),
    text: text.slice(0, 200),
    time: new Date().toISOString()
  });
  saveInteractions(_currentArticleId, data);

  // 记住昵称
  try { localStorage.setItem('kataichi_camp_nickname', name.slice(0, 12)); } catch(e) {}

  textEl.value = '';
  renderCommentList(data);
  btnEl.disabled = false;
  showToast('评论发布成功');
}

function renderLikeBtn(data) {
  var btn = document.getElementById('likeBtn');
  var icon = document.getElementById('likeIcon');
  var countEl = document.getElementById('likeCount');
  var devId = getDeviceId();
  var liked = data.likedBy.indexOf(devId) >= 0;

  if (liked) {
    btn.classList.add('liked');
    icon.setAttribute('fill', 'currentColor');
  } else {
    btn.classList.remove('liked');
    icon.setAttribute('fill', 'none');
  }
  countEl.textContent = data.likes || 0;
}

function renderCommentList(data) {
  var comments = data.comments || [];
  document.getElementById('commentCnt').textContent = comments.length;
  var el = document.getElementById('commentList');
  if (!comments.length) {
    el.innerHTML = '<div class="cm-empty">暂无评论，来说两句吧</div>';
    return;
  }
  // 按时间倒序
  var sorted = comments.slice().sort(function(a,b){ return b.id - a.id; });
  var h = '';
  sorted.forEach(function(c){
    var avatar = (c.name || '?').charAt(0);
    var timeStr = formatRelTime(c.time);
    h += '<div class="comment-item">';
    h += '<div class="cm-avatar">' + escHtml(avatar) + '</div>';
    h += '<div class="cm-body">';
    h += '<div class="cm-header"><span class="cm-name">' + escHtml(c.name) + '</span><span class="cm-time">' + escHtml(timeStr) + '</span></div>';
    h += '<div class="cm-text">' + escHtml(c.text) + '</div>';
    h += '</div></div>';
  });
  el.innerHTML = h;
}

function renderInteractions(articleId) {
  _currentArticleId = articleId;
  var data = getInteractions(articleId);
  renderLikeBtn(data);
  renderCommentList(data);

  // 恢复用户昵称
  var savedName = '';
  try { savedName = localStorage.getItem('kataichi_camp_nickname') || ''; } catch(e) {}
  document.getElementById('cmName').value = savedName;
  document.getElementById('cmText').value = '';
}

function formatRelTime(isoStr) {
  if (!isoStr) return '';
  try {
    var diff = Date.now() - new Date(isoStr).getTime();
    if (diff < 0) return '刚刚';
    var mins = Math.floor(diff / 60000);
    if (mins < 1) return '刚刚';
    if (mins < 60) return mins + ' 分钟前';
    var hours = Math.floor(mins / 60);
    if (hours < 24) return hours + ' 小时前';
    var days = Math.floor(hours / 24);
    if (days < 30) return days + ' 天前';
    var months = Math.floor(days / 30);
    if (months < 12) return months + ' 个月前';
    return Math.floor(months / 12) + ' 年前';
  } catch(e) { return ''; }
}

function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._tid);
  el._tid = setTimeout(function(){ el.classList.remove('show'); }, 2000);
}

// ── URL Hash 路由 ──
function handleHashRoute() {
  var hash = window.location.hash;
  if (!hash) return;
  var m = hash.match(/^#article-(\d+)$/);
  if (!m) return;
  var id = parseInt(m[1]);
  // 确保数据已加载
  var articles = getArticles();
  if (!articles.length) return;
  var exists = articles.some(function(a){ return a.id === id; });
  if (exists) {
    setTimeout(function(){ openArticle(id); }, 300);
  }
}

// ── 初始化 ──
loadArticles(function(){ renderList(); handleHashRoute(); });
</script>
</body>
