<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>学员信息 · 卡泰驰培训中心</title>
<style>
:root{
  --gold:#d4af37;--gold2:#f0d060;
  --pri:#6366f1;--suc:#10b981;--err:#ef4444;
}
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
  background:#060b14;color:#e2e8f0;min-height:100vh;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}
/* 背景光晕 */
.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-glow .orb{position:absolute;border-radius:50%;filter:blur(120px);opacity:.045}
.orb-a{width:500px;height:500px;background:var(--pri);top:-200px;right:-150px}
.orb-b{width:400px;height:400px;background:var(--gold);bottom:-150px;left:-120px}

/* 主容器 */
.wrap{
  position:relative;z-index:1;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px 20px;
}
.card{
  width:100%;max-width:440px;
  background:linear-gradient(160deg,rgba(255,255,255,.03),rgba(255,255,255,.008));
  border:1px solid rgba(255,255,255,.08);border-radius:24px;
  padding:48px 36px 40px;
  position:relative;overflow:hidden;
}
/* 顶部金色线条 */
.card::before{
  content:'';position:absolute;top:0;left:24px;right:24px;
  height:2px;border-radius:0 0 2px 2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}

/* Logo */
.logo-area{text-align:center;margin-bottom:36px}
.logo-area img{height:64px;width:auto;margin-bottom:16px}
.logo-area .brand{font-size:12px;font-weight:700;color:var(--gold);letter-spacing:4px;text-transform:uppercase}
.logo-area .title{font-size:22px;font-weight:800;color:#f1f5f9;margin-top:8px;letter-spacing:2px}
.logo-area .sub{font-size:13px;color:#475569;margin-top:8px;line-height:1.7}

/* 表单组 */
.form-group{margin-bottom:20px}
.form-group label{
  display:block;font-size:12px;font-weight:600;color:#64748b;
  margin-bottom:6px;letter-spacing:1px;
}
.form-group label .req{color:var(--err);margin-left:2px}
.form-group input,.form-group select{
  width:100%;padding:13px 16px;
  background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.1);
  border-radius:12px;color:#f1f5f9;font-size:15px;
  font-family:inherit;transition:all .3s;
  outline:none;-webkit-appearance:none;
}
.form-group input::placeholder{color:#475569}
.form-group input:focus,.form-group select:focus{
  border-color:var(--gold);background:rgba(212,175,55,.06);
  box-shadow:0 0 0 3px rgba(212,175,55,.08);
}
.form-group input.error,.form-group select.error{
  border-color:var(--err);background:rgba(239,68,68,.04);
}
.form-group .err-msg{font-size:11px;color:var(--err);margin-top:4px;display:none}
.form-group .err-msg.show{display:block}

/* select 箭头 */
.select-wrap{position:relative}
.select-wrap::after{
  content:'▼';position:absolute;right:16px;top:50%;transform:translateY(-50%);
  font-size:10px;color:var(--gold);pointer-events:none;
}

/* 提交按钮 */
.submit-btn{
  width:100%;padding:15px;margin-top:12px;
  background:linear-gradient(135deg,var(--gold),#b8941f);
  border:none;border-radius:12px;
  color:#0a0f1a;font-size:16px;font-weight:800;
  letter-spacing:2px;cursor:pointer;
  transition:all .35s;position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}
.submit-btn:hover{
  box-shadow:0 6px 28px rgba(212,175,55,.35);
  transform:translateY(-1px);
}
.submit-btn:active{transform:scale(.97);transition:transform .1s}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}

/* 跳过按钮 */
.skip-link{
  display:block;text-align:center;margin-top:16px;
  font-size:12px;color:#475569;cursor:pointer;
  background:none;border:none;width:100%;padding:8px;
  font-family:inherit;transition:color .3s;
  -webkit-tap-highlight-color:transparent;
}
.skip-link:hover{color:#64748b}

/* Toast */
.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:999;
  padding:10px 24px;border-radius:10px;font-size:13px;font-weight:600;
  color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.3);
  animation:toastIn .35s ease;
}
.toast-ok{background:var(--suc)}
.toast-err{background:var(--err)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* 加载动画 */
.loading-overlay{
  position:fixed;inset:0;background:rgba(6,11,20,.7);z-index:998;
  display:flex;align-items:center;justify-content:center;
}
.spinner{width:40px;height:40px;border:3px solid rgba(212,175,55,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:480px){
  .card{padding:36px 24px 32px}
  .logo-area img{height:52px}
  .logo-area .title{font-size:20px}
}
</style>
<script>
// 构建缓存版本
var __LOGIN_BUILD__ = '20260624v1';
</script>
</head>
<body><div class="bg-glow">
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>
</div>

<div class="wrap">
  <div class="card">

    <!-- Logo -->
    <div class="logo-area">
      <img src="logo.png" alt="卡泰驰 CARtech" onerror="this.style.display='none'">
      <div class="brand">Kataichi · Training Center</div>
      <div class="title">学员信息</div>
      <div class="sub">请填写您的基本信息<br>便于培训中心为您记录学习进度</div>
    </div>

    <!-- 姓名 -->
    <div class="form-group">
      <label>姓名 <span class="req">*</span></label>
      <input type="text" id="uname" placeholder="请输入您的姓名" maxlength="20">
      <div class="err-msg" id="errName">请输入姓名</div>
    </div>

    <!-- 手机号 -->
    <div class="form-group">
      <label>手机号 <span style="color:var(--gold);font-weight:400;letter-spacing:0;margin-left:4px">（选填）</span></label>
      <input type="tel" id="phone" placeholder="请输入手机号（选填）" maxlength="11">
      <div class="err-msg" id="errPhone">请输入正确的手机号</div>
    </div>

    <!-- 所属门店 -->
    <div class="form-group">
      <label>所属门店 <span class="req">*</span></label>
      <div class="select-wrap">
        <select id="store">
          <option value="">请选择门店</option>
        </select>
      </div>
      <input type="text" id="storeCustom" placeholder="或手动输入门店名称" maxlength="50" style="margin-top:8px;display:none">
      <div class="err-msg" id="errStore">请选择或输入门店</div>
    </div>

    <!-- 岗位 -->
    <div class="form-group">
      <label>岗位 <span class="req">*</span></label>
      <div class="select-wrap">
        <select id="position">
          <option value="">请选择岗位</option>
          <option value="销售顾问">🚗 销售顾问</option>
          <option value="数字化营销师">📱 数字化营销师</option>
          <option value="检测评估师">🔍 检测评估师</option>
          <option value="金融专员">💰 金融专员</option>
          <option value="维修技师">🔧 维修技师</option>
          <option value="店长/储备干部">👥 店长/储备干部</option>
          <option value="门店经理">📋 门店经理</option>
          <option value="区域经理">🌐 区域经理</option>
          <option value="其他">📌 其他</option>
        </select>
      </div>
      <div class="err-msg" id="errPosition">请选择岗位</div>
    </div>

    <!-- 提交 -->
    <button class="submit-btn" id="submitBtn" onclick="doLogin()">确 认 提 交</button>

    <button class="skip-link" onclick="skipLogin()">暂不登记，直接进入 →</button>

  </div>
</div>

<script>
// ══════════════════════════════════════
// 门店列表
// ══════════════════════════════════════
var STORES=[
  '北京朝阳门店','北京海淀门店','上海浦东门店','上海徐汇门店',
  '广州天河门店','深圳福田门店','深圳南山门店','成都武侯门店',
  '杭州西湖门店','南京鼓楼门店','武汉洪山门店','重庆渝北门店',
  '长沙岳麓门店','郑州金水门店','西安雁塔门店'
];

function initStores(){
  var sel=document.getElementById('store');
  STORES.forEach(function(s){
    var opt=document.createElement('option');
    opt.value=s;opt.textContent=s;sel.appendChild(opt);
  });
  // 手动输入
  var opt2=document.createElement('option');
  opt2.value='__custom__';opt2.textContent='✏️ 手动输入...';sel.appendChild(opt2);

  sel.addEventListener('change',function(){
    var custom=document.getElementById('storeCustom');
    if(this.value==='__custom__'){
      custom.style.display='block';custom.focus();
    }else{
      custom.style.display='none';custom.value='';
    }
  });

  // 手动输入时同步
  document.getElementById('storeCustom').addEventListener('input',function(){
    if(this.value.trim()){document.getElementById('store').value='__custom__'}
  });
}

// ══════════════════════════════════════
// 表单验证
// ══════════════════════════════════════
function validateForm(){
  var valid=true;
  var name=document.getElementById('uname');
  var phone=document.getElementById('phone');
  var store=document.getElementById('store');
  var storeCustom=document.getElementById('storeCustom');
  var position=document.getElementById('position');

  // 清除错误
  document.querySelectorAll('.error').forEach(function(el){el.classList.remove('error')});
  document.querySelectorAll('.err-msg.show').forEach(function(el){el.classList.remove('show')});

  // 姓名
  if(!name.value.trim()){
    name.classList.add('error');document.getElementById('errName').classList.add('show');valid=false;
  }

  // 手机号（选填，但填写后需验证格式）
  if(phone.value.trim()){
    if(!/^1[3-9]\d{9}$/.test(phone.value.trim())){
      phone.classList.add('error');document.getElementById('errPhone').classList.add('show');valid=false;
    }
  }

  // 门店
  var storeVal=store.value;
  if(storeVal==='__custom__'){storeVal=storeCustom.value.trim()}
  if(!storeVal){
    store.classList.add('error');
    if(storeVal==='__custom__')storeCustom.classList.add('error');
    document.getElementById('errStore').classList.add('show');valid=false;
  }

  // 岗位
  if(!position.value){
    position.classList.add('error');document.getElementById('errPosition').classList.add('show');valid=false;
  }

  return valid;
}

// ══════════════════════════════════════
// Toast
// ══════════════════════════════════════
function toast(msg,type){
  type=type||'ok';
  var t=document.createElement('div');
  t.className='toast toast-'+type;t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){t.remove()},2500);
}

// ══════════════════════════════════════
// 登录
// ══════════════════════════════════════
function doLogin(){
  if(!validateForm()){toast('请完善必填信息','err');return}

  var name=document.getElementById('uname').value.trim();
  var phone=document.getElementById('phone').value.trim();
  var store=document.getElementById('store').value;
  var storeCustom=document.getElementById('storeCustom').value.trim();
  var position=document.getElementById('position').value;

  if(store==='__custom__')store=storeCustom;
  if(!phone)phone='';

  var user={
    name:name,
    phone:phone,
    store:store,
    position:position,
    loginTime:new Date().toISOString(),
    lastActive:new Date().toISOString()
  };

  localStorage.setItem('kataichi_user',JSON.stringify(user));

  // 更新活跃记录（用于管理后台统计）
  updateActivityLog(name,store,position);

  // 显示加载动画
  var overlay=document.createElement('div');
  overlay.className='loading-overlay';
  overlay.innerHTML='<div class="spinner"></div>';
  document.body.appendChild(overlay);

  setTimeout(function(){
    location.replace('portal_v2.html');
  },500);
}

// ══════════════════════════════════════
// 活跃记录（供管理后台统计）
// ══════════════════════════════════════
function updateActivityLog(name,store,position){
  try{
    var log=JSON.parse(localStorage.getItem('kataichi_activity_log'))||[];
    log.push({
      name:name,store:store,position:position,
      action:'登录',time:new Date().toISOString()
    });
    // 只保留最近200条
    if(log.length>200)log=log.slice(-200);
    localStorage.setItem('kataichi_activity_log',JSON.stringify(log));
  }catch(e){}
}

// ══════════════════════════════════════
// 跳过
// ══════════════════════════════════════
function skipLogin(){
  localStorage.removeItem('kataichi_user');
  location.replace('portal_v2.html');
}

// ══════════════════════════════════════
// Init
// ══════════════════════════════════════
initStores();

// 如果之前登录过，预填信息
(function prefill(){
  try{
    var u=JSON.parse(localStorage.getItem('kataichi_user'));
    if(u&&u.name){
      document.getElementById('uname').value=u.name||'';
      document.getElementById('phone').value=u.phone||'';
      if(u.store){
        var sel=document.getElementById('store');
        var found=false;
        for(var i=0;i<sel.options.length;i++){
          if(sel.options[i].value===u.store){sel.value=u.store;found=true;break}
        }
        if(!found){
          sel.value='__custom__';
          document.getElementById('storeCustom').style.display='block';
          document.getElementById('storeCustom').value=u.store;
        }
      }
      document.getElementById('position').value=u.position||'';
    }
  }catch(e){}
})();
</script>
</body>
</html>
