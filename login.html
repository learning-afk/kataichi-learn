<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>学员信息 · 卡泰驰培训中心</title>
<style>
:root{
  --pri:#F5A623;--pri-lt:#FFF3E0;--pri-dk:#E69500;
  --suc:#4CAF50;--err:#F44336;
  --bg:#F5F6FA;--card:#FFFFFF;
  --t1:#1A1A2E;--t2:#666680;--t3:#999AAA;
  --bd:#E8E8EF;--sh:0 2px 12px rgba(0,0,0,.06);
}
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--bg);color:var(--t1);min-height:100vh;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}
/* 顶部装饰 */
.top-bar{height:4px;background:linear-gradient(90deg,var(--pri),#FFB84D);position:fixed;top:0;left:0;right:0;z-index:10}

/* 主容器 */
.wrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:40px 20px;
}
.card{
  width:100%;max-width:420px;
  background:var(--card);border:1px solid var(--bd);
  border-radius:16px;padding:40px 32px 36px;
  box-shadow:var(--sh);position:relative;
}

/* Logo */
.logo-area{text-align:center;margin-bottom:32px}
.logo-area img{height:56px;width:auto;margin-bottom:12px}
.logo-area .brand{font-size:11px;font-weight:600;color:var(--pri);letter-spacing:3px;text-transform:uppercase}
.logo-area .title{font-size:24px;font-weight:700;color:var(--t1);margin-top:8px}
.logo-area .sub{font-size:13px;color:var(--t3);margin-top:8px;line-height:1.7}

/* 表单 */
.form-group{margin-bottom:18px}
.form-group label{
  display:block;font-size:13px;font-weight:600;color:var(--t2);
  margin-bottom:6px;
}
.form-group label .req{color:var(--err);margin-left:2px}
.form-group input,.form-group select{
  width:100%;padding:12px 16px;
  background:var(--bg);border:1.5px solid var(--bd);
  border-radius:10px;color:var(--t1);font-size:15px;
  font-family:inherit;transition:all .3s;
  outline:none;-webkit-appearance:none;
}
.form-group input::placeholder{color:var(--t3)}
.form-group input:focus,.form-group select:focus{
  border-color:var(--pri);background:#FFF8E1;
  box-shadow:0 0 0 3px rgba(245,166,35,.1);
}
.form-group input.error,.form-group select.error{
  border-color:var(--err);background:#FFF5F5;
}
.form-group .err-msg{font-size:11px;color:var(--err);margin-top:4px;display:none}
.form-group .err-msg.show{display:block}

.select-wrap{position:relative}
.select-wrap::after{
  content:'▾';position:absolute;right:14px;top:50%;transform:translateY(-50%);
  font-size:12px;color:var(--pri);pointer-events:none;font-weight:700;
}
/* 提交按钮 */
.submit-btn{
  width:100%;padding:14px;margin-top:8px;
  background:linear-gradient(135deg,var(--pri),var(--pri-dk));
  border:none;border-radius:10px;
  color:#fff;font-size:16px;font-weight:700;
  letter-spacing:2px;cursor:pointer;
  transition:all .3s;
  -webkit-tap-highlight-color:transparent;
  box-shadow:0 4px 12px rgba(245,166,35,.3);
}
.submit-btn:active{transform:scale(.97)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}

.skip-link{
  display:block;text-align:center;margin-top:14px;
  font-size:12px;color:var(--t3);cursor:pointer;
  background:none;border:none;width:100%;padding:8px;
  font-family:inherit;transition:color .3s;
  -webkit-tap-highlight-color:transparent;
}
.skip-link:hover{color:var(--pri)}

.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:999;
  padding:10px 24px;border-radius:10px;font-size:13px;font-weight:600;
  color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.15);
  animation:toastIn .35s ease;
}
.toast-ok{background:var(--suc)}
.toast-err{background:var(--err)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.loading-overlay{
  position:fixed;inset:0;background:rgba(245,246,250,.8);z-index:998;
  display:flex;align-items:center;justify-content:center;
}
.spinner{width:36px;height:36px;border:3px solid #E8E8EF;border-top-color:var(--pri);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:480px){
  .card{padding:32px 24px 28px}
  .logo-area .title{font-size:22px}
}
</style>
<script>
var __LOGIN_BUILD__ = '20260624v2';
</script>
</head>
<body>

<div class="top-bar"></div>

<div class="wrap">
  <div class="card">

    <div class="logo-area">
      <img src="logo.png" alt="卡泰驰 CARtech" onerror="this.style.display='none'">
      <div class="brand">Kataichi · Training Center</div>
      <div class="title">学员信息</div>
      <div class="sub">请填写您的基本信息<br>便于培训中心为您记录学习进度</div>
    </div>

    <div class="form-group">
      <label>姓名 <span class="req">*</span></label>
      <input type="text" id="uname" placeholder="请输入您的姓名" maxlength="20">
      <div class="err-msg" id="errName">请输入姓名</div>
    </div>

    <div class="form-group">
      <label>手机号 <span style="color:var(--t3);font-weight:400;margin-left:4px">（选填）</span></label>
      <input type="tel" id="phone" placeholder="请输入手机号（选填）" maxlength="11">
      <div class="err-msg" id="errPhone">请输入正确的手机号</div>
    </div>

    <div class="form-group">
      <label>所属门店 <span class="req">*</span></label>
      <div class="select-wrap">
        <select id="store">
          <option value="">请选择门店</option>
        </select>
      </div>
      <input type="text" id="storeCustom" placeholder="或手动输入门店名称" maxlength="50" style="margin-top:8px;display:none">
      <div class="err-msg" id="errStore">请选择或输入门店</div>
    </div>

    <div class="form-group">
      <label>岗位 <span class="req">*</span></label>
      <div class="select-wrap">
        <select id="position">
          <option value="">请选择岗位</option>
          <option value="销售顾问">🚗 销售顾问</option>
          <option value="数字化营销师">📱 数字化营销师</option>
          <option value="检测评估师">🔍 检测评估师</option>
          <option value="金融专员">💰 金融专员</option>
          <option value="维修技师">🔧 维修技师</option>
          <option value="店长/储备干部">👥 店长/储备干部</option>
          <option value="门店经理">📋 门店经理</option>
          <option value="区域经理">🌐 区域经理</option>
          <option value="其他">📌 其他</option>
        </select>
      </div>
      <div class="err-msg" id="errPosition">请选择岗位</div>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="doLogin()">确 认 提 交</button>
    <button class="skip-link" onclick="skipLogin()">暂不登记，直接进入 →</button>

  </div>
</div>

<script>
var STORES=[
  '北京朝阳门店','北京海淀门店','上海浦东门店','上海徐汇门店',
  '广州天河门店','深圳福田门店','深圳南山门店','成都武侯门店',
  '杭州西湖门店','南京鼓楼门店','武汉洪山门店','重庆渝北门店',
  '长沙岳麓门店','郑州金水门店','西安雁塔门店'
];

function initStores(){
  var sel=document.getElementById('store');
  STORES.forEach(function(s){
    var opt=document.createElement('option');
    opt.value=s;opt.textContent=s;sel.appendChild(opt);
  });
  var opt2=document.createElement('option');
  opt2.value='__custom__';opt2.textContent='✏️ 手动输入...';sel.appendChild(opt2);
  sel.addEventListener('change',function(){
    var custom=document.getElementById('storeCustom');
    if(this.value==='__custom__'){custom.style.display='block';custom.focus()}
    else{custom.style.display='none';custom.value=''}
  });
  document.getElementById('storeCustom').addEventListener('input',function(){
    if(this.value.trim()){document.getElementById('store').value='__custom__'}
  });
}

function validateForm(){
  var valid=true;
  var name=document.getElementById('uname');
  var phone=document.getElementById('phone');
  var store=document.getElementById('store');
  var storeCustom=document.getElementById('storeCustom');
  var position=document.getElementById('position');
  document.querySelectorAll('.error').forEach(function(el){el.classList.remove('error')});
  document.querySelectorAll('.err-msg.show').forEach(function(el){el.classList.remove('show')});
  if(!name.value.trim()){name.classList.add('error');document.getElementById('errName').classList.add('show');valid=false}
  if(phone.value.trim()&&!/^1[3-9]\d{9}$/.test(phone.value.trim())){phone.classList.add('error');document.getElementById('errPhone').classList.add('show');valid=false}
  var storeVal=store.value;
  if(storeVal==='__custom__')storeVal=storeCustom.value.trim();
  if(!storeVal){store.classList.add('error');if(store.value==='__custom__')storeCustom.classList.add('error');document.getElementById('errStore').classList.add('show');valid=false}
  if(!position.value){position.classList.add('error');document.getElementById('errPosition').classList.add('show');valid=false}
  return valid;
}

function toast(msg,type){
  type=type||'ok';
  var t=document.createElement('div');
  t.className='toast toast-'+type;t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){t.remove()},2500);
}

function doLogin(){
  if(!validateForm()){toast('请完善必填信息','err');return}
  var name=document.getElementById('uname').value.trim();
  var phone=document.getElementById('phone').value.trim();
  var store=document.getElementById('store').value;
  var storeCustom=document.getElementById('storeCustom').value.trim();
  var position=document.getElementById('position').value;
  if(store==='__custom__')store=storeCustom;
  if(!phone)phone='';
  var user={name:name,phone:phone,store:store,position:position,loginTime:new Date().toISOString(),lastActive:new Date().toISOString()};
  localStorage.setItem('kataichi_user',JSON.stringify(user));
  updateActivityLog(name,store,position);
  var overlay=document.createElement('div');overlay.className='loading-overlay';overlay.innerHTML='<div class="spinner"></div>';document.body.appendChild(overlay);
  setTimeout(function(){location.replace('portal_v2.html')},500);
}

function updateActivityLog(name,store,position){
  try{
    var log=JSON.parse(localStorage.getItem('kataichi_activity_log'))||[];
    log.push({name:name,store:store,position:position,action:'登录',time:new Date().toISOString()});
    if(log.length>200)log=log.slice(-200);
    localStorage.setItem('kataichi_activity_log',JSON.stringify(log));
  }catch(e){}
}

function skipLogin(){
  localStorage.removeItem('kataichi_user');
  location.replace('portal_v2.html');
}

initStores();

(function prefill(){
  try{
    var u=JSON.parse(localStorage.getItem('kataichi_user'));
    if(u&&u.name){
      document.getElementById('uname').value=u.name||'';
      document.getElementById('phone').value=u.phone||'';
      if(u.store){
        var sel=document.getElementById('store');
        var found=false;
        for(var i=0;i<sel.options.length;i++){if(sel.options[i].value===u.store){sel.value=u.store;found=true;break}}
        if(!found){sel.value='__custom__';document.getElementById('storeCustom').style.display='block';document.getElementById('storeCustom').value=u.store}
      }
      document.getElementById('position').value=u.position||'';
    }
  }catch(e){}
})();
</script>
</body>
</html>
