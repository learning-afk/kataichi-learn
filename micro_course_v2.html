<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>卡泰驰培训中心 · 7天入职学习地图</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#f0f2f5;
  --card:#fff;
  --primary:#6366f1;
  --primary-dark:#4f46e5;
  --gold:#d4af37;
  --text:#1f2937;
  --text2:#4b5563;
  --text3:#6b7280;
  --muted:#9ca3af;
  --border:#e5e7eb;
  --success:#16a34a;
  --warning:#f59e0b;
  --danger:#dc2626;
  --radius:14px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08);
  --shadow-lg:0 8px 30px rgba(0,0,0,.12);
}

body{
  font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;
  background:var(--bg);color:var(--text);line-height:1.6;
  min-height:100vh;padding-bottom:80px;
  -webkit-tap-highlight-color:transparent;
}

/* ── topbar ── */
.topbar{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#e2e8f0;padding:14px 20px;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 16px rgba(0,0,0,.2);
}
.topbar-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar h1{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.topbar .badge{
  font-size:10px;background:var(--gold);color:#0f172a;
  padding:2px 10px;border-radius:10px;font-weight:700;
}
.topbar .sub{font-size:11px;color:#94a3b8;display:block}
.topbar-right{font-size:12px;color:#94a3b8}
.topbar-right a{color:#94a3b8;text-decoration:none;transition:color .2s}
.topbar-right a:hover{color:var(--gold)}

/* ── tabs ── */
.tabs{
  background:var(--card);border-bottom:1px solid var(--border);
  position:sticky;top:52px;z-index:99;overflow-x:auto;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}
.tabs-inner{
  max-width:1200px;margin:0 auto;display:flex;gap:0;white-space:nowrap;
}
.tab-btn{
  padding:14px 24px;border:none;background:none;font-size:14px;font-weight:600;
  color:var(--text3);cursor:pointer;border-bottom:3px solid transparent;
  transition:all .2s;display:flex;align-items:center;gap:6px;flex-shrink:0;
}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}

/* ── main ── */
.main{max-width:1200px;margin:0 auto;padding:20px}

/* ── banner ── */
.banner{
  background:linear-gradient(135deg,rgba(99,102,241,.08),rgba(99,102,241,.02));
  border:1px solid rgba(99,102,241,.15);border-radius:var(--radius);
  padding:24px;margin-bottom:24px;display:flex;align-items:center;gap:20px;
}
.banner .avatar{
  width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#818cf8);
  display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;color:#fff;
}
.banner .info{flex:1}
.banner h2{font-size:17px;font-weight:700;margin-bottom:4px}
.banner .stats-row{display:flex;gap:20px;flex-wrap:wrap}
.banner .stat-item{font-size:12px;color:var(--text3)}
.banner .stat-item .val{font-weight:700;color:var(--primary);font-size:18px}

/* ── section header ── */
.section-header{
  display:flex;align-items:center;gap:12px;margin:28px 0 14px;
}
.section-header .icon{
  width:40px;height:40px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
}
.section-header.required .icon{background:rgba(220,38,38,.1);color:#dc2626}
.section-header.professional .icon{background:rgba(99,102,241,.1);color:var(--primary)}
.section-header .title{font-size:17px;font-weight:700}
.section-header .sub{font-size:12px;color:var(--text3);display:block;margin-top:1px}

/* ── course grid ── */
.course-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:16px;margin-bottom:16px;
}

/* ── position group ── */
.position-group{margin-bottom:8px}
.position-header{
  display:flex;align-items:center;gap:10px;
  margin:20px 0 14px;padding:10px 16px;
  background:rgba(99,102,241,.04);border-radius:0 10px 10px 0;
  border-left:4px solid var(--primary);
}
.position-header .pos-dot{
  width:8px;height:8px;border-radius:50%;background:var(--primary);flex-shrink:0;
}
.position-header .pos-name{font-size:15px;font-weight:700;color:var(--text)}
.position-header .pos-count{
  font-size:12px;color:var(--primary);font-weight:600;
  background:rgba(99,102,241,.1);padding:3px 10px;border-radius:10px;
  margin-left:auto;
}

/* ── position filter ── */
.position-filter{
  display:flex;gap:8px;flex-wrap:wrap;margin:0 0 16px;
}
.position-filter .pf-chip{
  padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);
  background:var(--card);font-size:13px;font-weight:600;color:var(--text3);
  cursor:pointer;transition:all .2s;white-space:nowrap;
  -webkit-tap-highlight-color:transparent;user-select:none;
}
.position-filter .pf-chip:hover{border-color:var(--primary);color:var(--primary)}
.position-filter .pf-chip.active{
  background:var(--primary);color:#fff;border-color:var(--primary);
}
.position-filter .pf-chip .count{
  font-size:11px;opacity:.7;margin-left:2px;
}

/* ── course card ── */
.course-card{
  background:var(--card);border-radius:var(--radius);
  overflow:hidden;cursor:pointer;
  transition:all .25s;box-shadow:var(--shadow);
  border:1px solid var(--border);
}
.course-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
.course-card:active{transform:scale(.98)}

.cover{
  height:120px;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.cover.cover-red{background:linear-gradient(135deg,#fecaca,#fca5a5)}
.cover.cover-blue{background:linear-gradient(135deg,#bfdbfe,#93c5fd)}
.cover.cover-indigo{background:linear-gradient(135deg,#c7d2fe,#a5b4fc)}
.cover.cover-teal{background:linear-gradient(135deg,#99f6e4,#5eead4)}
.cover.cover-amber{background:linear-gradient(135deg,#fde68a,#fcd34d)}
.cover.cover-slate{background:linear-gradient(135deg,#e2e8f0,#cbd5e1)}
.cover.cover-purple{background:linear-gradient(135deg,#e9d5ff,#c4b5fd)}
.cover.cover-green{background:linear-gradient(135deg,#bbf7d0,#86efac)}
.cover .duration{
  position:absolute;bottom:8px;right:8px;
  background:rgba(0,0,0,.55);color:#fff;font-size:10px;
  padding:3px 8px;border-radius:6px;font-weight:600;
}
.cover .badge-status{
  position:absolute;top:8px;right:8px;
  font-size:10px;font-weight:700;padding:3px 10px;border-radius:10px;
}
.cover .badge-done{background:var(--success);color:#fff}
.cover .badge-new{background:var(--danger);color:#fff}

.course-body{padding:14px 16px 16px}
.course-body .cat{
  font-size:11px;color:var(--primary);font-weight:600;
  margin-bottom:4px;display:flex;align-items:center;gap:6px;
}
.course-body .cat .dot{width:6px;height:6px;border-radius:50%;background:var(--primary);flex-shrink:0}
.course-body h3{font-size:15px;font-weight:700;margin-bottom:4px;line-height:1.3}
.course-body .desc{font-size:12px;color:var(--text3);margin-bottom:10px;line-height:1.5}
.course-body .meta-row{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.course-body .meta{font-size:11px;color:var(--muted)}
.course-body .progress-wrap{display:flex;align-items:center;gap:6px;font-size:12px}
.course-body .progress-bar{
  width:60px;height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden;
}
.course-body .progress-fill{
  height:100%;background:var(--success);border-radius:3px;transition:width .4s;
}
.course-body .progress-pct{font-weight:700;color:var(--success)}

/* ── empty state ── */
.empty-state{
  text-align:center;padding:48px 20px;color:var(--muted);
}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}

/* ── bottom nav ── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--card);border-top:1px solid var(--border);
  padding:8px 0 env(safe-area-inset-bottom,12px);
  display:flex;justify-content:space-around;
}
.bottom-nav .nav-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;padding:4px 16px;border:none;background:none;
  font-size:11px;color:var(--text3);transition:color .2s;
}
.bottom-nav .nav-item svg{width:22px;height:22px}
.bottom-nav .nav-item.active{color:var(--primary)}

/* ── modal ── */
.modal-overlay{
  position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);
  display:flex;align-items:flex-end;justify-content:center;
}
.modal{
  background:var(--card);border-radius:20px 20px 0 0;
  width:100%;max-width:600px;max-height:85vh;overflow-y:auto;
  padding:28px 24px 24px;animation:slideUp .3s;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-header h3{font-size:18px;font-weight:700}
.modal-close{
  width:32px;height:32px;border-radius:50%;border:none;
  background:var(--bg);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:var(--text3);
}
.modal .section-list{display:flex;flex-direction:column;gap:10px}
.modal .section-item{
  display:flex;align-items:center;gap:12px;padding:12px 14px;
  background:var(--bg);border-radius:10px;transition:background .2s;
}
.modal .section-item .idx{
  width:28px;height:28px;border-radius:50%;background:var(--primary);
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;flex-shrink:0;
}
.modal .section-item .label{flex:1;font-size:14px}
.modal .section-item .btn-sm{
  font-size:11px;padding:6px 14px;border-radius:20px;border:none;
  cursor:pointer;font-weight:600;transition:all .2s;
}
.modal .section-item .btn-complete{
  background:rgba(22,163,74,.1);color:var(--success);
}
.modal .section-item .btn-complete:hover{background:var(--success);color:#fff}
.modal .section-item .btn-done{
  background:rgba(22,163,74,.15);color:var(--success);opacity:.6;cursor:default;
}
.modal-actions{display:flex;gap:12px;margin-top:20px}
.modal-actions button{
  flex:1;padding:12px;border-radius:12px;border:none;font-size:14px;
  font-weight:700;cursor:pointer;transition:all .2s;
}

/* ── 学习明星排行榜 ── */
.stars-banner{
  background:linear-gradient(135deg,#fef3c7,#fde68a,#fcd34d);
  border-radius:var(--radius);padding:20px;margin-bottom:20px;
  text-align:center;position:relative;overflow:hidden;
}
.stars-banner::after{
  content:'';position:absolute;top:-30px;right:-30px;
  width:100px;height:100px;background:rgba(255,255,255,.25);border-radius:50%;
}
.stars-banner h2{font-size:20px;font-weight:900;color:#92400e;margin-bottom:4px}
.stars-banner .sub{font-size:12px;color:#a16207}
.stars-banner .my-rank{
  margin-top:12px;display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.7);padding:8px 18px;border-radius:20px;
  font-size:13px;font-weight:700;color:#92400e;
}
.stars-banner .my-rank .rn{font-size:28px;font-weight:900}

.rank-table{width:100%;border-collapse:collapse;font-size:13px}
.rank-table td{padding:12px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.rank-table .rank-num{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:14px;flex-shrink:0;
}
.rank-1{background:#fef3c7;color:#b45309;font-size:20px !important}
.rank-2{background:#f1f5f9;color:#64748b;font-size:18px !important}
.rank-3{background:#fef2f2;color:#b45309;font-size:17px !important}
.rank-other{background:var(--bg);color:var(--text3)}
.rank-name{font-weight:700}
.rank-dept{font-size:11px;color:var(--text3)}
.rank-score{font-weight:900;color:var(--primary);text-align:right}
.rank-streak{font-weight:700;color:#f59e0b;text-align:right;font-size:12px}
.rank-badge-icon{font-size:18px}

.store-rank-card{
  background:var(--card);border-radius:var(--radius);padding:14px 16px;
  display:flex;align-items:center;gap:12px;margin-bottom:8px;
  border:1px solid var(--border);transition:all .2s;
}
.store-rank-card:hover{box-shadow:var(--shadow-md)}
.store-rank-card .sri{
  width:40px;height:40px;border-radius:12px;display:flex;align-items:center;
  justify-content:center;font-size:18px;font-weight:900;flex-shrink:0;
}
.store-rank-card .sri-1{background:#fef3c7;color:#b45309}
.store-rank-card .sri-2{background:#f1f5f9;color:#64748b}
.store-rank-card .sri-3{background:#e9d5ff;color:#7c3aed}
.store-rank-card .srd{flex:1;min-width:0}
.store-rank-card .srd .srn{font-size:14px;font-weight:700}
.store-rank-card .srd .srm{font-size:11px;color:var(--text3)}
.store-rank-card .srs{font-weight:900;color:var(--success);font-size:14px;white-space:nowrap}

.medal-row{
  display:flex;justify-content:center;align-items:flex-end;gap:12px;
  padding:20px 0 16px;
}
.medal-item{
  text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px;
}
.medal-item .micon{font-size:36px}
.medal-item .mname{font-size:13px;font-weight:700}
.medal-item .mdept{font-size:10px;color:var(--text3)}
.medal-item .mscore{font-size:11px;color:var(--primary);font-weight:700}
.medal-first .micon{font-size:48px}
.medal-first .mname{font-size:15px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-secondary{background:var(--bg);color:var(--text3)}
.btn-secondary:hover{background:var(--border)}

/* ── video section ── */
.video-section{margin-top:16px}
.video-card{
  background:var(--bg);border-radius:12px;padding:16px;margin-bottom:10px;
}
.video-card .vid-title{font-size:14px;font-weight:600;margin-bottom:4px}
.video-card .vid-dur{font-size:11px;color:var(--muted)}
.video-card .vid-play{
  display:inline-flex;align-items:center;gap:6px;margin-top:8px;
  padding:6px 16px;background:var(--primary);color:#fff;
  border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;
  border:none;transition:opacity .2s;
}
.video-card .vid-play:hover{opacity:.9}

/* ── responsive ── */
@media(max-width:768px){
  .topbar{padding:10px 14px}
  .topbar h1{font-size:16px}
  .tab-btn{padding:12px 16px;font-size:13px}
  .main{padding:14px}
  .banner{padding:18px;gap:14px}
  .banner h2{font-size:15px}
  .banner .stat-item .val{font-size:16px}
  .course-grid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
  .cover{height:100px}
  .modal{max-height:90vh}
}

.hidden{display:none!important}
</style>
<script>
// 防缓存：检测版本，过期则强制刷新
var __BUILD__='20260624v2';
var __cached__=localStorage.getItem('_mc_build');
if(__cached__&&__cached__!==__BUILD__){
  localStorage.setItem('_mc_build',__BUILD__);
  var url=location.href.split('?')[0]+'?v='+Date.now();
  location.replace(url);
}else{
  localStorage.setItem('_mc_build',__BUILD__);
}
</script>
</head>

<!-- 微信浏览器引导（学习地图页面） -->
<div id="wxGuide" style="display:none;position:fixed;inset:0;z-index:9999;background:#060b14;padding:60px 24px 40px;text-align:center;flex-direction:column;align-items:center;justify-content:center">
  <div style="width:72px;height:72px;background:linear-gradient(135deg,#d4af37,#f0c95a);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 24px;box-shadow:0 8px 32px rgba(212,175,55,.25)">📱</div>
  <h2 style="font-size:22px;font-weight:700;margin-bottom:10px;color:#fff">请在浏览器中打开</h2>
  <p style="font-size:14px;color:rgba(255,255,255,.5);margin-bottom:30px;line-height:1.6">微信内无法直接访问学习平台<br>请按以下步骤操作</p>
  <div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px 16px;margin-bottom:28px;text-align:left;width:100%;max-width:340px">
    <div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;font-size:14px;color:rgba(255,255,255,.7)"><span style="flex-shrink:0;width:24px;height:24px;background:rgba(212,175,55,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;color:#d4af37;font-weight:700">1</span><span>点击右上角 <b style="color:#d4af37">···</b> 按钮</span></div>
    <div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;font-size:14px;color:rgba(255,255,255,.7);border-top:1px solid rgba(255,255,255,.06)"><span style="flex-shrink:0;width:24px;height:24px;background:rgba(212,175,55,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;color:#d4af37;font-weight:700">2</span><span>选择 <b style="color:#d4af37">在浏览器中打开</b></span></div>
    <div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;font-size:14px;color:rgba(255,255,255,.7);border-top:1px solid rgba(255,255,255,.06)"><span style="flex-shrink:0;width:24px;height:24px;background:rgba(212,175,55,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;color:#d4af37;font-weight:700">3</span><span>在浏览器中开始学习</span></div>
  </div>
  <div style="display:flex;flex-direction:column;gap:12px;width:100%;max-width:340px">
    <button onclick="wxCopyLink()" style="display:block;width:100%;padding:14px 0;border-radius:12px;font-size:15px;font-weight:600;background:linear-gradient(135deg,#d4af37,#b8962e);color:#060b14;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(212,175,55,.3)">📋 复制链接到浏览器</button>
    <button onclick="wxSkipGuide()" style="display:block;width:100%;padding:14px 0;border-radius:12px;font-size:15px;font-weight:600;background:transparent;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.6);cursor:pointer">仍要继续访问</button>
  </div>
</div>
<div id="wxToast" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.85);color:#fff;padding:14px 28px;border-radius:10px;font-size:14px;z-index:99999;display:none;pointer-events:none"></div>
<script>
(function(){
  if(navigator.userAgent.toLowerCase().indexOf('micromessenger')===-1)return;
  document.getElementById('wxGuide').style.display='flex';
  var s=document.createElement('style');s.textContent='.topbar,.tab-nav,.tab-content,.bottom-nav{display:none!important}';
  document.head.appendChild(s);
  window.wxCopyLink=function(){
    var url='https://mayuan0314.github.io/kataichi-learn/';
    var copy=function(u){
      if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(u).then(function(){showWxToast3('链接已复制，请粘贴到浏览器打开')}).catch(function(){showWxToast3('复制失败')});return}
      var ta=document.createElement('textarea');ta.value=u;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();
      try{document.execCommand('copy');showWxToast3('链接已复制，请粘贴到浏览器打开')}catch(e){showWxToast3('复制失败，请手动输入网址')}
      document.body.removeChild(ta);

// ── localStorage ──
var STORAGE_KEY='kataichi_micro_progress';

function getProgress(){
  try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}}catch(e){return{}}
}
function saveProgress(p){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(p));
  // 记录学习日期
  var today=new Date().toISOString().slice(0,10);
  var days=JSON.parse(localStorage.getItem('kataichi_days')||'[]');
  if(days.indexOf(today)===-1){days.push(today);days.sort();localStorage.setItem('kataichi_days',JSON.stringify(days))}
}

function getConsecutiveDays(){
  var days=JSON.parse(localStorage.getItem('kataichi_days')||'[]');
  if(!days.length)return 0;
  var today=new Date();var count=0;
  for(var i=days.length-1;i>=0;i--){
    var d=new Date(days[i]);
    var diff=Math.floor((today-d)/86400000);
    if(diff===count)count++;else break;
  }
  return count;
}

function courseCard(c,p){
  p=p||0;
  var badge='';
  if(p>=100)badge='<span class="badge-status badge-done">已完成</span>';
  else badge='<span class="badge-status badge-new">新课</span>';
  var catLabel=c.cat==='required'?'企业文化必修课':'专业课 · '+c.pos;
  return '<div class="course-card" onclick="openCourse('+c.id+')">'+
    '<div class="cover '+c.cover+'">'+
      '<span style="font-size:44px">'+c.icon+'</span>'+
      '<span class="duration">'+c.dur+'</span>'+badge+
    '</div>'+
    '<div class="course-body">'+
      '<div class="cat"><span class="dot"></span>'+catLabel+' · '+c.sections.length+'节</div>'+
      '<h3>'+c.title+'</h3>'+
      '<p class="desc">'+c.desc+'</p>'+
      '<div class="meta-row">'+
        '<span class="meta">📖 '+c.sections.length+'个章节</span>'+
        '<div class="progress-wrap">'+
          '<div class="progress-bar"><div class="progress-fill" style="width:'+p+'%"></div></div>'+
          '<span class="progress-pct">'+p+'%</span>'+
        '</div>'+
      '</div>'+
    '</div>'+
  '</div>';
}

function renderAll(){
  updateStats();

  if(currentTab==='roadmap')renderRoadmapDays();
  if(currentTab==='my')showMyProgress();
}

function updateStats(){
  var progress=getProgress();
  var total=COURSES.length;
  var completed=0;
  COURSES.forEach(function(c){if((progress[c.id]||0)>=100)completed++});
  document.getElementById('statDone').textContent=completed;
  document.getElementById('statDays').textContent=getConsecutiveDays();
  document.getElementById('statRate').textContent=total?Math.round(completed/total*100)+'%':'0%';
}

function renderDayBlock(d,progress){
  var allTasks=d.tasks.length;
  var onlineDone=0;var onlineTotal=0;
  d.tasks.forEach(function(t){
    if(t.cids){
      onlineTotal+=t.cids.length;
      t.cids.forEach(function(cid){if((progress[cid]||0)>=100)onlineDone++});
    }
  });
  var dayDone=onlineTotal>0?Math.round(onlineDone/onlineTotal*100):0;

  var html='<div style="background:var(--card);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;border:1px solid '+(dayDone>=100?'#16a34a':'var(--border)')+'">'+
    // 日标题栏
    '<div style="display:flex;align-items:center;gap:12px;padding:14px 16px;background:'+(dayDone>=100?'rgba(22,163,74,.06)':'rgba(99,102,241,.04)')+';border-bottom:1px solid var(--border)">'+
      '<div style="width:42px;height:42px;border-radius:12px;background:'+(dayDone>=100?'#16a34a':'var(--primary)')+';color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;flex-shrink:0">'+d.day+'</div>'+

        '<div style="font-size:15px;font-weight:700">Day '+d.day+' — '+d.title+'</div>'+
        '<div style="font-size:11px;color:var(--text3)">'+d.desc+'</div>'+
      '</div>'+
      (onlineTotal>0?'<div style="font-size:11px;color:'+(dayDone>=100?'var(--success)':'var(--text3)')+';text-align:right;white-space:nowrap">'+
        '🎬 微课 '+onlineDone+'/'+onlineTotal+
      '</div>':'')+
    '</div>'+
    // 任务列表
    '<div style="padding:8px 12px 12px">';
  d.tasks.forEach(function(t){
    var tt=TASK_TYPES[t.t]||TASK_TYPES.study;
    var onlineStatus='';
    if(t.cids){
      var cDone=t.cids.filter(function(cid){return (progress[cid]||0)>=100}).length;
      var cStatus=cDone===t.cids.length?'✅':'⏳';
      onlineStatus='<span style="font-size:10px;color:'+(cDone===t.cids.length?'var(--success)':'var(--text3)')+';margin-left:4px">'+cStatus+cDone+'/'+t.cids.length+'</span>';
    }
    html+='<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 12px;margin:4px 0;border-radius:10px;background:'+tt.bg+';border:1px solid '+tt.border+'">'+
      '<span style="font-size:16px;flex-shrink:0;margin-top:1px">'+tt.icon+'</span>'+
      '<div style="flex:1;min-width:0">'+
        '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'+
          '<span style="font-size:13px;font-weight:700">'+t.h+'</span>'+
          '<span style="font-size:10px;padding:2px 8px;border-radius:10px;background:'+tt.bg+';color:'+tt.color+';font-weight:600;border:1px solid '+tt.border+'">'+tt.label+'</span>'+
          (t.b?'<span style="font-size:9px;padding:2px 6px;border-radius:8px;background:#fef3c7;color:#92400e;font-weight:600">'+t.b+'</span>':'')+
          onlineStatus+
        '</div>'+
        '<div style="font-size:11px;color:var(--text3);margin-top:3px;line-height:1.5">'+t.d+'</div>'+
        // 在线微课课程卡片
        (t.cids?'<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">'+t.cids.map(function(cid){
          var c=COURSES.find(function(x){return x.id===cid});
          if(!c)return'';
          var cp=progress[c.id]||0;
          var cd=cp>=100;
          return '<button type="button" style="display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:14px;font-size:11px;font-weight:600;cursor:pointer;background:'+(cd?'rgba(22,163,74,.1)':'var(--bg)')+';color:'+(cd?'var(--success)':'var(--primary)')+';border:1px solid '+(cd?'rgba(22,163,74,.2)':'var(--border)')+'" onclick="event.stopPropagation();openCourse('+cid+')">'+c.icon+' '+c.title+(cd?' ✓':'')+'</button>';
        }).join('')+'</div>':'')+
      '</div>'+
      '<span style="font-size:10px;color:var(--muted);white-space:nowrap;flex-shrink:0">'+t.hh+'</span>'+
    '</div>';
  });
  // 通关考核
  if(d.cp){
    html+='<div style="display:flex;align-items:flex-start;gap:8px;padding:10px 12px;margin:8px 4px 4px;border-radius:10px;background:rgba(212,175,55,.06);border:1px dashed rgba(212,175,55,.3)">'+

      '<div style="font-size:11px;color:#92400e;line-height:1.5"><strong>通关考核：</strong>'+d.cp+'</div>'+

  return html;

function switchTab(tab){
  currentTab=tab;
  ['roadmap','stars'].forEach(function(t){
    var el=document.getElementById('tab-'+t);
    if(t===tab)el.classList.remove('hidden');else el.classList.add('hidden');
  });
  var btns=document.querySelectorAll('.tab-btn');
  btns.forEach(function(b){
    var txt=b.textContent.trim();
    if((tab==='roadmap'&&txt.includes('学习地图'))||
       (tab==='stars'&&txt.includes('学习明星')))b.classList.add('active');
    else b.classList.remove('active');
  });
  // 底部导航
  var nis=document.querySelectorAll('.bottom-nav .nav-item');
  nis.forEach(function(n,i){
    var idxs={roadmap:0,stars:1};
    if(i===idxs[tab])n.classList.add('active');else n.classList.remove('active');
  });
  if(tab==='roadmap'){renderRoadmapFilter();renderRoadmapDays();}
  if(tab==='stars')renderStarsTab();
  updateStats();
}

  nis.forEach(function(n,i){if(i===2)n.classList.add('active');else n.classList.remove('active')});

  var progress=getProgress();
  var completed=COURSES.filter(function(c){return (progress[c.id]||0)>=100});
  var inProgress=COURSES.filter(function(c){var p=progress[c.id]||0;return p>0&&p<100});
  var notStarted=COURSES.filter(function(c){return !progress[c.id]});

  document.getElementById('tab-roadmap').innerHTML=
    '<div class="section-header required"><div class="icon">📊</div><div><span class="title">我的学习</span></div></div>'+
    '<div class="section-header required"><div class="icon">📊</div><div><span class="title">我的学习</span></div></div>'+
    '<div class="banner" style="margin-bottom:16px">'+
      '<div class="avatar" style="background:linear-gradient(135deg,#16a34a,#22c55e)">✅</div>'+
      '<div class="info">'+
        '<h2>学习概览</h2>'+
        '<div class="stats-row">'+
          '<div class="stat-item">已完成 <span class="val">'+completed.length+'</span> 门</div>'+
          '<div class="stat-item">进行中 <span class="val" style="color:#f59e0b">'+inProgress.length+'</span> 门</div>'+
          '<div class="stat-item">未开始 <span class="val" style="color:#9ca3af">'+notStarted.length+'</span> 门</div>'+
        '</div>'+
      '</div>'+
    '</div>'+
    (completed.length?'<div class="section-header"><div class="icon" style="background:rgba(22,163,74,.1);color:#16a34a">✅</div><div><span class="title">已完成</span></div></div><div class="course-grid">'+completed.map(function(c){return courseCard(c,100)}).join('')+'</div>':'')+
    (inProgress.length?'<div class="section-header"><div class="icon" style="background:rgba(245,158,11,.1);color:#f59e0b">⏳</div><div><span class="title">进行中</span></div></div><div class="course-grid">'+inProgress.map(function(c){return courseCard(c,progress[c.id]||0)}).join('')+'</div>':'')+
    (notStarted.length?'<div class="section-header"><div class="icon" style="background:rgba(156,163,175,.1);color:#9ca3af">📋</div><div><span class="title">待学习</span></div></div><div class="course-grid">'+notStarted.map(function(c){return courseCard(c,0)}).join('')+'</div>':'')+
    '<div style="height:60px"></div>';
}

// ── 课程详情弹窗 ──
function openCourse(id){
  var c=COURSES.find(function(x){return x.id===id});
  if(!c)return;
  var progress=getProgress();
  var p=progress[c.id]||0;
  var sectionsDone=progress[c.id+'_sections']||[];
  var html='<div class="modal-header">'+
    '<h3>'+c.icon+' '+c.title+'</h3>'+
    '<button class="modal-close" onclick="document.getElementById(\'modalOverlay\').classList.add(\'hidden\')">✕</button>'+
  '</div>'+
  '<p style="color:var(--text3);font-size:13px;margin-bottom:16px">'+c.desc+'</p>'+
  '<div style="font-size:14px;font-weight:700;margin-bottom:10px">📚 课程章节（'+c.sections.length+'节）</div>'+
  '<div class="section-list">';
  c.sections.forEach(function(s,i){
    var done=sectionsDone.indexOf(i)>-1;
    html+='<div class="section-item">'+
      '<div class="idx" style="'+(done?'background:#16a34a':'')+'">'+(i+1)+'</div>'+
      '<div class="label">'+s+'</div>'+
      '<button class="btn-sm '+(done?'btn-done':'btn-complete')+'" onclick="event.stopPropagation();toggleSection('+c.id+','+i+')">'+(done?'✓ 已学':'标记完成')+'</button>'+
    '</div>';
  });
  html+='</div>';
  // 视频区占位（先显示，后异步加载）
  html+='<div id="videosSection_'+c.id+'"><div style="text-align:center;padding:16px;color:var(--text3);font-size:12px">⏳ 加载视频...</div></div>';
  html+='<div class="modal-actions">'+
    '<button class="btn-secondary" onclick="resetCourse('+c.id+')">🔄 重新学习</button>'+
    '<button class="btn-primary" onclick="markComplete('+c.id+')">✅ 全部标记完成</button>'+
  '</div>';
  document.getElementById('modalBody').innerHTML=html;
  document.getElementById('modalOverlay').classList.remove('hidden');
  // 异步加载视频
  loadCourseVideos(c);
}

var API_BASE='http://localhost:3000';
function loadCourseVideos(c){
  // 先显示内置视频
  var builtinHtml='';
  if(c.videos&&c.videos.length){
    builtinHtml='<div style="font-size:14px;font-weight:700;margin:16px 0 10px">🎬 参考视频</div>';
    c.videos.forEach(function(v){
      builtinHtml+='<div class="video-card"><div class="vid-title">'+v.title+'</div><div class="vid-dur">⏱ '+v.dur+'</div></div>';
    });
  }
  // 尝试从API获取已上传视频
  try{
    var xhr=new XMLHttpRequest();
    xhr.open('GET',API_BASE+'/api/courses/'+c.id+'/videos',true);
    xhr.timeout=5000;
    xhr.onload=function(){
      var section=document.getElementById('videosSection_'+c.id);
      if(!section)return;
      try{var j=JSON.parse(xhr.responseText);var linked=j.data||[]}catch(e){var linked=[]}
      var html='';
      if(linked.length){
        html+='<div style="font-size:14px;font-weight:700;margin:16px 0 10px">🎬 课程视频（'+linked.length+'个）</div>';
        linked.forEach(function(m){
          var v=m.video||{};
          var secLabel=m.section!=null?' · 章节'+(m.section+1):'';
          html+='<div class="video-card">'+
            '<div class="vid-title">▶ '+(v.originalName||'未命名视频')+secLabel+'</div>'+
            '<div class="vid-dur">'+(v.size?(v.size/1024/1024).toFixed(1)+'MB':'')+'</div>'+
            '<a href="'+API_BASE+v.url+'" target="_blank" class="vid-play">▶ 播放视频</a>'+
          '</div>';
        });
      }
      if(!linked.length&&!c.videos)html='<div style="text-align:center;padding:12px;color:var(--muted);font-size:12px">暂无视频资源</div>';
      else if(!linked.length&&c.videos)html='';
      section.innerHTML=html+(linked.length?builtinHtml:'');
    };
    xhr.onerror=function(){
      var section=document.getElementById('videosSection_'+c.id);
      if(section)section.innerHTML=builtinHtml||'<div style="text-align:center;padding:12px;color:var(--muted);font-size:12px">视频服务未连接</div>';
    };
    xhr.ontimeout=xhr.onerror;
    xhr.send();
  }catch(e){
    var section=document.getElementById('videosSection_'+c.id);
    if(section)section.innerHTML=builtinHtml||'';
  }
}

function toggleSection(courseId,idx){
  var progress=getProgress();
  var key=courseId+'_sections';
  var arr=progress[key]||[];
  var pos=arr.indexOf(idx);
  if(pos>-1)arr.splice(pos,1);else arr.push(idx);
  progress[key]=arr;
  // 计算进度
  var c=COURSES.find(function(x){return x.id===courseId});
  progress[courseId]=c?Math.round(arr.length/c.sections.length*100):0;
  saveProgress(progress);
  renderAll();
  openCourse(courseId);
}

function markComplete(courseId){
  var progress=getProgress();
  var c=COURSES.find(function(x){return x.id===courseId});
  progress[courseId]=100;
  progress[courseId+'_sections']=c.sections.map(function(_,i){return i});
  saveProgress(progress);
  renderAll();
  openCourse(courseId);
}

function resetCourse(courseId){
  var progress=getProgress();
  progress[courseId]=0;
  progress[courseId+'_sections']=[];
  saveProgress(progress);
  renderAll();
  openCourse(courseId);
}

function closeModal(e){
  if(e.target===document.getElementById('modalOverlay')){
    document.getElementById('modalOverlay').classList.add('hidden');
    renderAll();
  }
}

// ── 初始化 ──
switchTab('roadmap');
</script>
