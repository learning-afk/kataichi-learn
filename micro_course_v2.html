<title>卡泰驰培训中心 · 7天入职学习地图</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#F5F6FA; --card:#FFF; --pri:#F5A623; --pri-dk:#E69500;
  --m2:#0D9488; --m2-lt:#E6FFFA;
  --text:#1A1A2E; --t2:#4b5563; --t3:#666680; --muted:#999AAA;
  --bd:#E8E8EF; --suc:#4CAF50; --err:#F44336;
  --rs:14px; --sh:0 1px 3px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.03);
  --sh-md:0 4px 16px rgba(0,0,0,.08);
}

body{
  font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--bg);color:var(--text);line-height:1.6;
  min-height:100vh;padding-bottom:40px;
  -webkit-tap-highlight-color:transparent;
}

/* topbar */
.topbar{background:var(--card);padding:12px 20px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06);border-bottom:3px solid var(--m2)}
.topbar-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-logo{height:30px;width:auto}
.topbar h1{font-size:17px;font-weight:700;color:var(--text)}
.topbar-right{font-size:12px;color:var(--t3)}
.topbar-right a{color:var(--t3);text-decoration:none;transition:color .2s}
.topbar-right a:hover{color:var(--m2)}

/* main container */
.main{max-width:960px;margin:0 auto;padding:20px}

/* hero */
.hero{background:linear-gradient(135deg,rgba(13,148,136,.06),rgba(13,148,136,.02));border:1px solid rgba(13,148,136,.15);border-radius:var(--rs);padding:24px;margin-bottom:24px;display:flex;align-items:center;gap:20px}
.hero-icon{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--m2),#14b8a6);display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;flex-shrink:0}
.hero-info{flex:1}
.hero h2{font-size:17px;font-weight:700;margin-bottom:4px}
.hero-stats{display:flex;gap:24px;flex-wrap:wrap}
.hero-stat{font-size:12px;color:var(--t3)}
.hero-stat .val{font-weight:800;color:var(--m2);font-size:20px}

/* position filter */
.pos-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.pos-chip{padding:8px 18px;border-radius:20px;border:1.5px solid var(--bd);background:var(--card);font-size:13px;font-weight:600;color:var(--t3);cursor:pointer;transition:all .2s;white-space:nowrap;user-select:none}
.pos-chip:hover{border-color:var(--m2);color:var(--m2)}
.pos-chip.active{background:var(--m2);color:#fff;border-color:var(--m2)}

/* day cards */
.day-card{background:var(--card);border-radius:var(--rs);margin-bottom:12px;overflow:hidden;border:1px solid var(--bd);box-shadow:var(--sh)}
.day-header{padding:14px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:background .2s}
.day-header:hover{background:#fafbfc}
.day-num{width:40px;height:40px;border-radius:12px;background:var(--m2-lt);color:var(--m2);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;flex-shrink:0}
.day-num.done{background:var(--suc);color:#fff}
.day-info{flex:1;min-width:0}
.day-info h3{font-size:15px;font-weight:700}
.day-info .day-desc{font-size:12px;color:var(--t3);margin-top:2px}
.day-arrow{font-size:14px;color:var(--t3);transition:transform .25s;flex-shrink:0}
.day-card.open .day-arrow{transform:rotate(180deg)}
.day-check{font-size:11px;font-weight:600;padding:3px 8px;border-radius:10px;flex-shrink:0}
.day-check.ok{background:rgba(76,175,80,.1);color:var(--suc)}
.day-check.ing{background:rgba(13,148,136,.08);color:var(--m2)}

/* day body */
.day-body{display:none;border-top:1px solid var(--bd)}
.day-card.open .day-body{display:block}
.course-list{padding:8px 0}
.course-item{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid #f5f5f5;transition:background .15s}
.course-item:last-child{border-bottom:none}
.course-item:hover{background:#fafdfc}
.ci-check{position:relative;flex-shrink:0}
.ci-check input{position:absolute;opacity:0;width:0;height:0}
.ci-check-box{width:22px;height:22px;border-radius:6px;border:2px solid #d1d5db;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.ci-check input:checked+.ci-check-box{background:var(--suc);border-color:var(--suc)}
.ci-check input:checked+.ci-check-box::after{content:'✓';color:#fff;font-size:13px;font-weight:700;line-height:1}
.ci-icon{font-size:20px;flex-shrink:0}
.ci-info{flex:1;min-width:0}
.ci-info .ci-title{font-size:14px;font-weight:600}
.ci-info .ci-meta{font-size:11px;color:var(--muted);margin-top:2px}
.ci-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:8px;flex-shrink:0}
.ci-tag.study{background:#eef2ff;color:#4F6EF7}
.ci-tag.online{background:var(--m2-lt);color:var(--m2)}
.ci-tag.shadow{background:#fff7ed;color:#F97316}

/* empty */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty .emoji{font-size:48px;margin-bottom:12px}
.empty p{font-size:14px}

/* responsive */
@media(max-width:768px){
  .topbar{padding:10px 14px}
  .topbar-logo{height:26px}
  .topbar h1{font-size:15px}
  .main{padding:14px}
  .hero{padding:18px;gap:14px}
  .hero h2{font-size:15px}
  .hero-stat .val{font-size:16px}
  .hero-stats{gap:16px}
  .day-header{padding:12px 14px;gap:10px}
  .day-num{width:34px;height:34px;font-size:16px}
  .day-info h3{font-size:14px}
  .course-item{padding:10px 14px;gap:8px}
}
</style>

// ── localStorage ──
var STORAGE_KEY = 'kataichi_micro_v2';
function loadProg() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {} } catch(e) { return {} } }
function saveProg(p) { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)) }

// ── state ──
var curPos = '';

// ── build position filter ──
function buildPosFilter() {
  var container = document.getElementById('posFilter');
  POSITIONS.forEach(function(pos) {
    var chip = document.createElement('span');
    chip.className = 'pos-chip'; chip.textContent = pos;
    chip.onclick = function() { setPosition(pos) };
    container.appendChild(chip);
  });
}

function setPosition(pos) {
  curPos = pos;
  var chips = document.querySelectorAll('.pos-chip');
  chips.forEach(function(c) { c.classList.toggle('active', c.textContent === pos) });
  renderDays();
}

// ── render day cards ──
function renderDays() {
  var container = document.getElementById('dayCards');
  if (!curPos) { container.innerHTML = '<div class="empty"><div class="emoji">👆</div><p>请先选择你的岗位</p></div>'; updateStats(); return; }

  var prog = loadProg();
  var prefix = curPos + '__';
  var allDays = ROADMAP_COMMON.concat(ROADMAP[curPos] || []);
  var totalItems = 0, doneItems = 0;

  var html = '';
  allDays.forEach(function(day, di) {
    var dayKey = prefix + 'day' + day.day;
    var dayDone = prog[dayKey];
    var itemsHtml = '';
    var dayDoneCount = 0;

    day.items.forEach(function(item, ii) {
      var itemKey = dayKey + '_' + ii;
      var checked = prog[itemKey] ? ' checked' : '';
      if (checked) dayDoneCount++;
      totalItems++; if (checked) doneItems++;
      var tagClass = item.t === 'online' ? 'online' : (item.t === 'shadow' ? 'shadow' : 'study');
      var tagText = item.t === 'online' ? '在线' : (item.t === 'shadow' ? '跟岗' : '学习');
      var iconMap = {study:'📖', online:'🎬', shadow:'👀', practice:'🎯'};
      itemsHtml += '<label class="course-item">' +
        '<span class="ci-check"><input type="checkbox"' + checked + ' onchange="toggleItem(\'' + itemKey + '\')"><span class="ci-check-box"></span></span>' +
        '<span class="ci-icon">' + (iconMap[item.t] || '📌') + '</span>' +
        '<span class="ci-info"><span class="ci-title">' + item.h + '</span><span class="ci-meta">' + item.d + '</span></span>' +
        '<span class="ci-tag ' + tagClass + '">' + tagText + '</span>' +
        '</label>';
    });

    var allDone = dayDoneCount === day.items.length;
    html += '<div class="day-card' + (allDone ? ' open' : '') + '" data-day="' + day.day + '">' +
      '<div class="day-header" onclick="toggleDay(this)">' +
        '<div class="day-num' + (allDone ? ' done' : '') + '">' + day.day + '</div>' +
        '<div class="day-info"><h3>' + day.title + '</h3><div class="day-desc">' + day.items.length + '项任务</div></div>' +
        '<span class="day-check ' + (allDone ? 'ok' : 'ing') + '">' + (allDone ? '已完成' : dayDoneCount + '/' + day.items.length) + '</span>' +
        '<span class="day-arrow">▼</span>' +
      '</div>' +
      '<div class="day-body"><div class="course-list">' + itemsHtml + '</div></div>' +
    '</div>';
  });

  container.innerHTML = html;
  updateStats(totalItems, doneItems);
}

function toggleDay(header) {
  var card = header.parentElement;
  card.classList.toggle('open');
}

function toggleItem(key) {
  var prog = loadProg();
  prog[key] = !prog[key];
  saveProg(prog);
  renderDays();
  // re-expand the day card that was toggled
  var parts = key.split('__');
  var dayNum = parts[1].replace('day','');
  setTimeout(function() {
    var cards = document.querySelectorAll('.day-card');
    cards.forEach(function(c) {
      if (c.dataset.day === dayNum) c.classList.add('open');
    });
  }, 50);
}

// ── stats ──
function updateStats(t, d) {
  if (typeof t === 'number') {
    document.getElementById('statDone').textContent = d;
    document.getElementById('statRate').textContent = t ? Math.round(d / t * 100) + '%' : '0%';
  } else {
    document.getElementById('statDone').textContent = '0';
    document.getElementById('statRate').textContent = '0%';
  }
}

// ── init ──
buildPosFilter();
renderDays();
</script>
