<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>管理后台 · 卡泰驰培训中心</title>
<style>
:root{
  --pri:#F5A623;--pri2:#FFB84D;--pri-lt:#FFF3E0;
  --suc:#4CAF50;--warn:#f59e0b;--err:#F44336;
  --g50:#f9fafb;--g100:#f3f4f6;--g200:#E8E8EF;--g300:#d1d5db;--g400:#999AAA;
  --g500:#6b7280;--g600:#4b5563;--g700:#374151;--g800:#1A1A2E;--g900:#111827;
  --m1:#4F6EF7;--m2:#0D9488;--m4:#7C3AED;
  --r:12px;--rs:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#F5F6FA;color:var(--g800);min-height:100vh}

/* ── Header ── */
.header{background:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;position:sticky;top:0;z-index:100;border-bottom:3px solid var(--pri);box-shadow:0 1px 4px rgba(0,0,0,.04)}
.hl{display:flex;align-items:center;gap:8px}
.hl .admin-logo{height:26px;width:auto}
.hl h1{font-size:16px;font-weight:700}
.hl .badge{background:var(--pri-lt);padding:2px 8px;border-radius:20px;font-size:10px;color:var(--pri)}
.hr{display:flex;align-items:center;gap:8px;font-size:11px}
.hr a{color:var(--pri);text-decoration:none}
.mode-badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700}
.mode-local{background:rgba(76,175,80,.15);color:#388E3C}
.mode-cloud{background:var(--pri-lt);color:#E69500}

/* ── Tabs ── */
.tabbar{background:#fff;border-bottom:1px solid var(--g200);display:flex;padding:0 12px;position:sticky;top:53px;z-index:99;overflow-x:auto}
.tabbar button{padding:12px 16px;border:none;background:none;font-size:13px;font-weight:600;color:var(--g400);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
.tabbar button.active{color:var(--pri);border-bottom-color:var(--pri)}

/* ── Container ── */
.ct{max-width:1280px;margin:0 auto;padding:16px 12px 40px}
.panel{background:#fff;border-radius:var(--r);padding:18px;box-shadow:0 1px 2px rgba(0,0,0,.05);margin-bottom:16px}
.panel-hd{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:6px;color:var(--g800)}

/* ── Buttons ── */
.btn{padding:9px 16px;border:none;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-pri{background:var(--pri);color:#fff}
.btn-out{background:#fff;border:1.5px solid var(--g200);color:var(--g600)}
.btn-err{background:#fff;border:1.5px solid #fee2e2;color:var(--err)}
.btn-suc{background:var(--suc);color:#fff}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:6px}

/* ── Upload zone ── */
.upload-zone{border:2px dashed var(--g300);border-radius:var(--r);padding:32px;text-align:center;cursor:pointer;background:var(--g50);transition:all .2s}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--pri);background:#FFF8EC}
.upload-zone .ico{font-size:40px;margin-bottom:8px}
.upload-zone p{font-size:13px;color:var(--g500)}
.upload-zone .sub{font-size:11px;color:var(--g400);margin-top:4px}
.upload-progress{margin-top:12px}
.upload-progress .bar{height:6px;background:var(--g200);border-radius:3px;overflow:hidden;margin-bottom:4px}
.upload-progress .fill{height:100%;background:var(--pri);border-radius:3px;transition:width .3s}
.upload-progress .txt{font-size:11px;color:var(--g500)}

/* ── Table ── */
.vtable{width:100%;border-collapse:collapse;font-size:12px}
.vtable th{text-align:left;padding:8px 10px;background:var(--g50);color:var(--g500);font-weight:600;font-size:11px;border-bottom:2px solid var(--g200);white-space:nowrap}
.vtable td{padding:10px;border-bottom:1px solid var(--g100);vertical-align:middle}
.vtable tr:hover td{background:#FFF8EC}
.vname{font-weight:600;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vtable-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}

/* ── Stats ── */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.stat-card{background:#fff;border-radius:var(--r);padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);border-top:3px solid transparent}
.stat-card .si{font-size:20px;margin-bottom:6px}
.stat-card .sv{font-size:24px;font-weight:900}
.stat-card .sl{font-size:11px;color:var(--g400);margin-top:2px}

/* ── SOP Progress ── */
.sop-module{background:var(--g50);border-radius:var(--rs);padding:14px;margin-bottom:10px;border-left:3px solid var(--m1)}
.sop-module-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sop-module-title{font-size:13px;font-weight:700;color:var(--g800)}
.sop-pct{font-size:12px;font-weight:700;color:var(--m1)}
.sop-bar{height:6px;background:var(--g200);border-radius:3px;overflow:hidden}
.sop-fill{height:100%;background:var(--m1);border-radius:3px;transition:width .6s ease}
.sop-cards-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.sop-card-chip{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;background:#eef2ff;color:var(--m1)}
.sop-card-chip.done{background:#d1fae5;color:#065f46}
.sop-card-chip.inprog{background:#fef3c7;color:#92400e}

/* ── Course list (学习地图Tab) ── */
.course-list{display:flex;flex-direction:column;gap:6px}
.course-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1.5px solid var(--g200);border-radius:var(--r);cursor:pointer;transition:all .2s}
.course-item:hover{border-color:var(--pri2);background:#FFF8EC}
.course-item.selected{border-color:var(--pri);background:#FFF8EC}
.course-item .ci{font-size:22px;flex-shrink:0}
.course-item .ct-info{flex:1;min-width:0}
.course-item .ctt{font-size:14px;font-weight:700}
.course-item .ctm{font-size:11px;color:var(--g400)}
.course-item .cb{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;flex-shrink:0}
.cb-req{background:#fee2e2;color:var(--err)}
.cb-pro{background:#eef2ff;color:var(--m1)}
.sec-label{font-size:13px;font-weight:700;color:var(--g700);margin:16px 0 8px;padding-left:8px;border-left:3px solid var(--pri)}
.linked-video{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#fff;border-radius:var(--rs);border:1px solid var(--g200);margin-bottom:6px}
.linked-video .vt{flex:1;font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── custom course picker ── */
.course-picker{flex:1;max-width:200px}
.course-picker-btn{width:100%;padding:5px 8px;border:1.5px solid var(--g200);border-radius:6px;font-size:11px;background:#fff;color:var(--g700);cursor:pointer;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;justify-content:space-between;gap:4px}
.course-picker-btn:hover{border-color:var(--pri2)}
.course-picker-btn.open{border-color:var(--pri)}
.course-picker-btn .arrow{font-size:8px;color:var(--g400);transition:transform .2s;flex-shrink:0}
.course-picker-btn.open .arrow{transform:rotate(180deg)}
.course-picker-drop{display:none;position:fixed;z-index:9999;width:320px;max-height:460px;overflow-y:auto;background:#fff;border:1.5px solid var(--g200);border-radius:var(--r);box-shadow:0 8px 30px rgba(0,0,0,.15)}
.course-picker-drop.show{display:block}
.course-picker-backdrop{display:none;position:fixed;inset:0;z-index:9998}
.course-picker-backdrop.show{display:block}
.course-picker-group{padding:6px 0}
.course-picker-glabel{padding:4px 14px;font-size:10px;color:var(--g500);font-weight:600;letter-spacing:.5px}
.course-picker-opt{padding:6px 14px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;border-left:3px solid transparent;transition:background .15s}
.course-picker-opt:hover{background:var(--pri-lt)}
.course-picker-opt.active{background:#eef2ff;border-left-color:var(--pri);font-weight:600}

/* ── Camp Tab ── */
.camp-stat-mini{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:16px}
.csm-item{background:var(--g50);border-radius:var(--rs);padding:12px;text-align:center}
.csm-val{font-size:20px;font-weight:900;color:var(--m4)}
.csm-label{font-size:11px;color:var(--g500);margin-top:2px}

/* ── Toast ── */
.toast{position:fixed;top:16px;right:16px;z-index:9999;padding:10px 18px;border-radius:var(--rs);font-size:13px;font-weight:600;color:#fff;animation:si .3s;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.toast-ok{background:var(--suc)}
.toast-err{background:var(--err)}
.toast-info{background:var(--pri)}
@keyframes si{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}

.empty-hint{text-align:center;padding:24px;color:var(--g400);font-size:12px}
.empty-hint .ico{font-size:36px;margin-bottom:6px}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.tag-ok{background:#d1fae5;color:var(--suc)}
.tag-warn{background:#fef3c7;color:var(--warn)}
.tag-err{background:#fee2e2;color:var(--err)}

/* ── 学习数据：用户表格 ── */
.user-card{background:linear-gradient(135deg,rgba(79,110,247,.07),rgba(79,110,247,.02));border:1.5px solid #c7d2fe;border-radius:var(--r);padding:16px;margin-bottom:16px}
.user-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;font-size:13px}
.user-kv{display:flex;flex-direction:column;gap:2px}
.user-kv .k{font-size:11px;color:var(--g400)}
.user-kv .v{font-weight:700;color:var(--g800)}

@media(min-width:768px){
  .header{padding:14px 24px}.tabbar{padding:0 24px}
  .tabbar button{padding:13px 20px;font-size:14px}
  .ct{padding:20px 24px 40px}.panel{padding:24px}
}
@media(max-width:767px){
  .vtable th:nth-child(2),.vtable td:nth-child(2),
  .vtable th:nth-child(3),.vtable td:nth-child(3){display:none}
  .vtable .vname{max-width:100px}
  .course-picker-drop{width:280px!important}
  .course-picker{max-width:140px}
}
</style>
</head>

var API = window.location.origin;

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function safeDecode(str){
  if(!str) return str;
  try{
    var hi=0; for(var i=0;i<str.length;i++){var c=str.charCodeAt(i);if(c>127&&c<256)hi++}
    if(hi>str.length*0.2){
      var fixed=''; try{fixed=decodeURIComponent(escape(str))}catch(e2){}
      if(fixed&&/[\u4e00-\u9fff]/.test(fixed)) return fixed;
    }
  }catch(e){}
  return str;
}
function toast(msg, type){
  var el=document.createElement('div');
  el.className='toast toast-'+(type||'info');
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(function(){el.remove()},3000);
}

// ── 服务器检测 ──
function detectServer(){
  fetch(API+'/api/camp/articles?_t='+Date.now(),{signal:AbortSignal.timeout?AbortSignal.timeout(3000):undefined})
    .then(function(r){return r.ok?r.json():Promise.reject()})
    .then(function(){
      hasServer=true;
      var bar=document.getElementById('serverBar');
      if(bar) bar.style.display='none';
      var tag=document.getElementById('modeTag');
      if(tag){tag.textContent='🟢 本地服务';tag.className='mode-badge mode-local'}
      switchTab(currentTab);
    })
    .catch(function(){
      hasServer=false;
      var bar=document.getElementById('serverBar');
      if(bar){bar.style.display='flex';document.getElementById('serverBarText').textContent='⚠️ 本地服务未连接 — 视频上传、封面上传功能需要启动本地服务（双击"启动服务.bat"）'}
      var tag=document.getElementById('modeTag');
      if(tag){tag.textContent='☁️ 云端模式';tag.className='mode-badge mode-cloud'}
      switchTab(currentTab);
    });
}
function retryDetect(){ detectServer(); }

// ── Tab 切换 ──
function switchTab(idx){
  currentTab=idx;
  document.querySelectorAll('.tabbar button').forEach(function(b,i){b.classList.toggle('active',i===idx)});
  if(idx===0) renderDataTab();
  else if(idx===1) renderVideoTab();
  else if(idx===2) renderCampTab();
}

function statCard(icon,label,val,color){
  return '<div class="stat-card" style="border-top-color:'+color+'">'+
    '<div class="si">'+icon+'</div>'+
    '<div class="sv" style="color:'+color+'">'+val+'</div>'+
    '<div class="sl">'+label+'</div></div>';
}
function todayCount(log){
  var today=new Date().toISOString().slice(0,10);
  return log.filter(function(l){return (l.time||'').slice(0,10)===today}).length;
}

async function uploadVideo(file){
  if(!file){toast('请选择文件','err');return}
  if(file.size>500*1024*1024){toast('文件超过500MB限制','err');return}
  var pd=document.getElementById('uploadProgress');
  var fill=document.getElementById('progressFill');
  var txt=document.getElementById('progressTxt');
  pd.style.display='block';fill.style.width='0%';txt.textContent='上传中...';
  var fd=new FormData();fd.append('video',file);
  try{
    var r=await new Promise(function(resolve,reject){
      var xhr=new XMLHttpRequest();
      xhr.upload.addEventListener('progress',function(e){
        if(e.lengthComputable){var p=Math.round(e.loaded/e.total*100);fill.style.width=p+'%';txt.textContent='上传中 '+p+'%'}
      });
      xhr.addEventListener('load',function(){resolve(xhr)});
      xhr.addEventListener('error',function(){reject(new Error('网络错误'))});
      xhr.open('POST',API+'/api/videos/upload');xhr.send(fd);
    });
    var j=JSON.parse(r.responseText);
    if(j.ok){toast('上传成功','ok');loadVideos()}else{toast(j.msg||'上传失败','err')}
  }catch(e){toast('上传失败: '+e.message,'err')}
  setTimeout(function(){pd.style.display='none';fill.style.width='0%'},2000);
}

async function loadVideos(){
  var el=document.getElementById('videoList');
  var countEl=document.getElementById('videoCountTip');
  if(!el) return;
  var videos=[];
  if(hasServer){
    try{
      var r=await fetch(API+'/api/videos');var j=await r.json();
      videos=j.data||[];
    }catch(e){videos=[]}
  }else{
    try{videos=JSON.parse(localStorage.getItem('kataichi_local_videos'))||[]}catch(e){}
  }
  if(countEl) countEl.textContent=videos.length?'共'+videos.length+'个':'';
  if(!videos.length){
    el.innerHTML='<div class="empty-hint"><div class="ico">🎞️</div><p>暂无视频，请先上传</p></div>';
    return;
  }
  var mappings=[];
  if(hasServer){
    try{var rm=await fetch(API+'/api/mappings');var jm=await rm.json();mappings=jm.data||[]}catch(e){}
  }else{
    try{mappings=JSON.parse(localStorage.getItem('kataichi_admin_mappings'))||[]}catch(e){}
  }
  var h='<div class="vtable-wrap"><table class="vtable"><thead><tr>'+
    '<th>视频名称</th><th>大小</th><th>上传时间</th><th>关联课程</th><th>操作</th>'+
    '</tr></thead><tbody>';
  videos.forEach(function(v){
    var nm=safeDecode(v.originalName||v.filename||'');
    var linked=mappings.filter(function(m){return m.videoId===v.id});
    var courseNames=linked.map(function(m){
      var c=EMBED_COURSES.find(function(x){return x.id===m.courseId});
      return c?c.title:'';
    }).filter(Boolean);
    h+='<tr>'+
      '<td><div class="vname" title="'+escHtml(nm)+'">🎬 '+escHtml(nm)+'</div></td>'+
      '<td style="font-size:11px;color:var(--g500)">'+formatSize(v.size)+'</td>'+
      '<td style="font-size:11px;color:var(--g500)">'+fmtDate(v.uploadedAt)+'</td>'+
      '<td>'+
        (courseNames.length
          ? '<div style="display:flex;flex-wrap:wrap;gap:4px">'+courseNames.map(function(n){return '<span style="background:#eef2ff;color:var(--m1);padding:2px 7px;border-radius:8px;font-size:10px;font-weight:600">'+escHtml(n)+'</span>'}).join('')+'</div>'
          : '<span style="color:var(--g300);font-size:11px">未关联</span>')+
      '</td>'+
      '<td>'+
        '<div style="display:flex;gap:6px">'+
          buildCoursePickerBtn(v.id, linked[0]?linked[0].courseId:null)+
          '<button class="btn btn-err btn-xs" onclick="deleteVideo('+v.id+')">删除</button>'+
        '</div>'+
      '</td>'+
    '</tr>';
  });
  h+='</tbody></table></div>';
  el.innerHTML=h;
}

async function pickCourse(courseId){
  closeAllPickers();
  if(!_pickerVideoId) return;
  var videoId=_pickerVideoId;
  var c=EMBED_COURSES.find(function(x){return x.id===courseId});
  if(_pickerBtnEl) _pickerBtnEl.querySelector('.cp-label').textContent=c?c.title:'选择课程';

  if(hasServer){
    try{
      await fetch(API+'/api/mappings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({videoId:videoId,courseId:courseId})});
      toast('关联成功','ok');loadVideos();
    }catch(e){toast('关联失败','err')}
  }else{
    try{
      var mappings=JSON.parse(localStorage.getItem('kataichi_admin_mappings'))||[];
      mappings=mappings.filter(function(m){return m.videoId!==videoId});
      mappings.push({videoId:videoId,courseId:courseId,at:new Date().toISOString()});
      localStorage.setItem('kataichi_admin_mappings',JSON.stringify(mappings));
      toast('关联已保存（本地）','ok');loadVideos();
    }catch(e){toast('保存失败','err')}
  }
}
async function deleteVideo(id){
  if(!confirm('确认删除此视频？')) return;
  if(hasServer){
    try{await fetch(API+'/api/videos/'+id,{method:'DELETE'});toast('已删除','ok');loadVideos()}catch(e){toast('删除失败','err')}
  }else{
    try{
      var videos=JSON.parse(localStorage.getItem('kataichi_local_videos'))||[];
      videos=videos.filter(function(v){return v.id!==id});
      localStorage.setItem('kataichi_local_videos',JSON.stringify(videos));
      var mappings=JSON.parse(localStorage.getItem('kataichi_admin_mappings'))||[];
      mappings=mappings.filter(function(m){return m.videoId!==id});
      localStorage.setItem('kataichi_admin_mappings',JSON.stringify(mappings));
      toast('已删除','ok');loadVideos();
    }catch(e){toast('删除失败','err')}
  }
}

function selectCourse(id){

  document.getElementById('matchDetail').innerHTML='<div class="empty-hint"><div class="ico">⏳</div><p>加载中...</p></div>';

async function renderMatchDetail(){
  var c=EMBED_COURSES.find(function(x){return x.id===_selectedCourseId});
  if(!c) return;
  var linked=[],allVideos=[];
  if(hasServer){
    try{
      var r=await fetch(API+'/api/mappings');var jm=await r.json();
      var allMappings=jm.data||[];
      linked=allMappings.filter(function(m){return m.courseId===_selectedCourseId});
      var rv=await fetch(API+'/api/videos');var jv=await rv.json();
      allVideos=jv.data||[];
      linked.forEach(function(m){
        var v=allVideos.find(function(x){return x.id===m.videoId});
        m.videoName=v?(v.originalName||v.filename||'#'+m.videoId):'#'+m.videoId;
      });
    }catch(e){}
  }else{
    try{
      var mappings=JSON.parse(localStorage.getItem('kataichi_admin_mappings'))||[];
      linked=mappings.filter(function(m){return m.courseId===_selectedCourseId});
      allVideos=JSON.parse(localStorage.getItem('kataichi_local_videos'))||[];
      linked.forEach(function(m){
        var v=allVideos.find(function(x){return x.id===m.videoId});
        m.videoName=v?(v.originalName||v.filename||'#'+m.videoId):'#'+m.videoId;
      });
    }catch(e){}
  }

  var h='<div class="panel" style="background:var(--g50)">'+
    '<div class="panel-hd">'+c.icon+' '+escHtml(c.title)+
      ' <span style="font-size:11px;font-weight:400;color:var(--g400)">'+escHtml(c.pos||'全员')+' · '+escHtml(c.dur)+'</span>'+
    '</div>'+
    '<p style="font-size:12px;color:var(--g500);margin-bottom:12px">已关联 '+linked.length+' 个视频</p>';

  if(linked.length){
    linked.forEach(function(m){
      h+='<div class="linked-video">'+
        '<span style="font-size:16px">▶</span>'+
        '<span class="vt">'+escHtml(safeDecode(m.videoName||''))+'</span>'+
        '<button class="btn btn-err btn-xs" onclick="unlinkVideo('+m.videoId+','+c.id+')">取消关联</button>'+
      '</div>';
    });
  }else{
    h+='<div class="empty-hint"><div class="ico">🔗</div><p>此课程暂无关联视频，请在上方视频库中选择</p></div>';
  }
  h+='</div>';
  var el=document.getElementById('matchDetail');
  if(el) el.innerHTML=h;
}
async function unlinkVideo(videoId,courseId){
  if(!confirm('确认取消关联？')) return;
  if(hasServer){
    try{
      await fetch(API+'/api/mappings',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({videoId:videoId,courseId:courseId})});
      toast('已取消关联','ok');loadVideos();renderMatchDetail();
    }catch(e){toast('操作失败','err')}
  }else{
    try{
      var mappings=JSON.parse(localStorage.getItem('kataichi_admin_mappings'))||[];
      mappings=mappings.filter(function(m){return !(m.videoId===videoId&&m.courseId===courseId)});
      localStorage.setItem('kataichi_admin_mappings',JSON.stringify(mappings));
      toast('已取消关联','ok');loadVideos();renderMatchDetail();
    }catch(e){toast('操作失败','err')}
  }
}

    }
  });

  document.getElementById('camp_title').focus();
}

function closeCampEditor(){
  var m=document.getElementById('campEditorModal');
  if(m) m.remove();
}

function normalizeContentUrls(content){
  var r=String(content||'');
  r=r.replace(/https?:\/\/localhost:\d+\//gi,'/');
  r=r.replace(/file:\/\/\/[^\s"'>]+?\/(uploads\/covers\/[^\s"'>]+)/gi,'/$1');
  r=r.replace(/file:\/\/\/[^\s"'>]+(uploads\/covers\/[^\s"'>]+)/gi,'/$1');
  r=r.replace(/<!--StartFragment-->|<!--EndFragment-->/gi,'');
  r=r.replace(/<\/?html[^>]*>|<\/?head[^>]*>|<\/?body[^>]*>/gi,'');
  r=r.replace(/src="(?!http|https|\/)(uploads\/covers\/)/gi,'src="/$1');
  return r;
}

function extractFirstImage(html){
  if(!html) return '';
  var m=html.match(/<img[^>]+src\s*=\s*["']([^"']+)["']/i);
  return m?m[1]:'';
}

// ── 一键同步到前端 camp-data.json ──
async function syncCampToCloud(){
  if(!hasServer){ toast('仅服务端模式支持同步','err'); return; }
  toast('正在同步...','');
  try{
    // 先同步 localStorage
    var r1=await fetch(API+'/api/camp/articles?_t='+Date.now());
    var j1=await r1.json();
    if(j1&&j1.ok&&Array.isArray(j1.data)){
      localStorage.setItem('kataichi_camp_articles',JSON.stringify(j1.data));
    }
    // 导出 camp-data.json
    var r2=await fetch(API+'/api/camp/sync',{method:'POST'});
    var j2=await r2.json();
    if(!j2.ok){ toast('同步失败: '+(j2.msg||'未知错误'),'err'); return; }
    // 推送到 GitHub
    var r3=await fetch(API+'/api/camp/push',{method:'POST'});
    var j3=await r3.json();
    toast('✅ 已同步 '+(j2.count||'')+' 篇 — '+(j3.ok?j3.msg:j3.msg||'推送未执行'),j3.ok?'ok':'warn');
  }catch(e){
    toast('同步失败: 服务端不可达','err');
  }
}

async function doSyncPush(){
  try{ await fetch(API+'/api/camp/sync',{method:'POST'}); }catch(e){}
  try{ await fetch(API+'/api/camp/push',{method:'POST'}); }catch(e){}
}

async function saveCampArticle(){
  var title=(document.getElementById('camp_title').value||'').trim();
  if(!title){toast('请填写培训标题','err');document.getElementById('camp_title').focus();return}

  var excerpt=(document.getElementById('camp_excerpt').value||'').trim();
  var cat=document.getElementById('camp_cat').value;
  var date=document.getElementById('camp_date').value;
  var days=document.getElementById('camp_days').value;
  var location=(document.getElementById('camp_location').value||'').trim();
  var people=document.getElementById('camp_people').value;
  var content=normalizeContentUrls(document.getElementById('camp_content').value||'');
  var cover=extractFirstImage(content);
  var top=document.getElementById('camp_top').checked;

  var payload={
    title,excerpt,cat,date,
    days: days!==''?Number(days):null,
    location,
    people: people!==''?Number(people):null,
    cover,content,top
  };

  if(hasServer){
    try{
      var isNew=_editingCampId===null;
      var url=isNew?(API+'/api/camp/articles'):(API+'/api/camp/articles/'+_editingCampId);
      var method=isNew?'POST':'PUT';
      var r=await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      var j=await r.json();
      if(!j.ok) throw new Error(j.msg||'保存失败');

      // 同步到 localStorage（云端模式 camp.html 优先读取）
      try{
        var localList=[];
        try{localList=JSON.parse(localStorage.getItem('kataichi_camp_articles')||'[]')}catch(e){}
        if(isNew){
          localList.unshift(Object.assign({id:j.id||Date.now(),createdAt:new Date().toISOString()},payload));
        }else{
          var idx2=localList.findIndex(function(a){return a.id===_editingCampId});
          if(idx2>=0) localList[idx2]=Object.assign({},localList[idx2],payload,{updatedAt:new Date().toISOString()});
        }
        localStorage.setItem('kataichi_camp_articles',JSON.stringify(localList));
      }catch(e){}

      // 自动同步 + 推送 camp-data.json
      doSyncPush();

      toast(isNew?'发布成功（已同步）':'修改已保存（已同步）','ok');
      closeCampEditor();
      renderCampTab();
    }catch(e){
      // 服务端失败，降级到本地存储
      hasServer=false;
      var modeTag=document.getElementById('modeTag');
      if(modeTag){modeTag.textContent='☁️ 云端模式';modeTag.className='mode-badge mode-cloud'}
      // 本地存储兜底
      var list=[];
      try{list=JSON.parse(localStorage.getItem('kataichi_camp_articles')||'[]')}catch(e2){}
      if(_editingCampId===null){
        var newId=Date.now();
        list.unshift(Object.assign({id:newId,createdAt:new Date().toISOString()},payload));
      }else{
        var idx=list.findIndex(function(a){return a.id===_editingCampId});
        if(idx>=0) list[idx]=Object.assign({},list[idx],payload,{updatedAt:new Date().toISOString()});
      }
      try{localStorage.setItem('kataichi_camp_articles',JSON.stringify(list))}catch(e2){}
      toast('服务端不可达（'+e.message+'），已保存到本地浏览器','warn');
      closeCampEditor();
      renderCampTab();
    }
  }else{
    // 本地存储
    var list=[];
    try{list=JSON.parse(localStorage.getItem('kataichi_camp_articles')||'[]')}catch(e){}
    if(_editingCampId===null){
      var newId=Date.now();
      list.unshift(Object.assign({id:newId,createdAt:new Date().toISOString()},payload));
    }else{
      var idx=list.findIndex(function(a){return a.id===_editingCampId});
      if(idx>=0) list[idx]=Object.assign({},list[idx],payload,{updatedAt:new Date().toISOString()});
    }
    try{localStorage.setItem('kataichi_camp_articles',JSON.stringify(list))}catch(e){}
    toast('已保存（本地）','ok');
    closeCampEditor();
    renderCampTab();
  }
}

async function deleteCampArticle(id){
  if(!confirm('确认删除此培训记录？此操作不可撤销')) return;
  var list=[];
  try{list=JSON.parse(localStorage.getItem('kataichi_camp_articles')||'[]')}catch(e){}
  list=list.filter(function(a){return a.id!==id});
  localStorage.setItem('kataichi_camp_articles',JSON.stringify(list));

  if(hasServer){
    try{
      var r=await fetch(API+'/api/camp/articles/'+id,{method:'DELETE'});
      if(!r.ok) throw new Error('HTTP '+r.status);
      var j=await r.json();
      if(!j.ok) throw new Error(j.msg||'删除失败');
      // 自动同步 + 推送 camp-data.json
      doSyncPush();
      toast('已删除（已同步）','ok');
    }catch(e){
      hasServer=false;
      document.getElementById('modeTag').textContent='☁️ 云端模式';
      document.getElementById('modeTag').className='mode-badge mode-cloud';
      toast('服务端删除失败（'+e.message+'），已从本地存储中删除','warn');
    }
  }else{
    toast('已删除','ok');
  }
  renderCampTab();
}
