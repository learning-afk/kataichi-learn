<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>管理后台 · 卡泰驰培训中心</title>
<style>
:root{
  --pri:#F5A623;--pri2:#FFB84D;--pri-lt:#FFF3E0;
  --suc:#4CAF50;--warn:#f59e0b;--err:#F44336;
  --g50:#f9fafb;--g100:#f3f4f6;--g200:#E8E8EF;--g300:#d1d5db;--g400:#999AAA;
  --g500:#6b7280;--g600:#4b5563;--g700:#374151;--g800:#1A1A2E;--g900:#111827;
  --r:12px;--rs:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#F5F6FA;color:var(--g800);min-height:100vh}

/* ── Header ── */
.header{background:#fff;color:var(--g800);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;position:sticky;top:0;z-index:100;border-bottom:3px solid var(--pri);box-shadow:0 1px 4px rgba(0,0,0,.04)}
.hl{display:flex;align-items:center;gap:8px;min-width:0}
.hl .admin-logo{height:26px;width:auto;flex-shrink:0}
.hl h1{font-size:16px;font-weight:700;white-space:nowrap}
.hl .badge{background:var(--pri-lt);padding:2px 8px;border-radius:20px;font-size:10px;color:var(--pri);white-space:nowrap}
.hr{display:flex;align-items:center;gap:8px;font-size:11px;min-width:0}
.hr a{color:var(--pri);text-decoration:none;white-space:nowrap}
.mode-badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.mode-local{background:rgba(76,175,80,.15);color:#388E3C}
.mode-cloud{background:var(--pri-lt);color:#E69500}

/* ── Mode banner ── */
.banner{text-align:center;padding:10px 16px;font-size:12px;font-weight:600;display:none}
.banner.show{display:block}
.banner-info{background:#FFF3E0;color:#E69500;border-bottom:1px solid #FFE0B2}
.banner-warn{background:#FFF5F5;color:#D32F2F;border-bottom:1px solid #FFCDD2}

/* ── Tabs ── */
.tabbar{background:#fff;border-bottom:1px solid var(--g200);display:flex;gap:0;padding:0 12px;position:sticky;top:53px;z-index:99;overflow-x:auto}
.tabbar button{
  padding:12px 16px;border:none;background:none;font-size:13px;font-weight:600;color:var(--g400);
  cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;
}
.tabbar button.active{color:var(--pri);border-bottom-color:var(--pri)}

/* ── Container ── */
.ct{max-width:1280px;margin:0 auto;padding:16px 12px 40px}
.panel{background:#fff;border-radius:var(--r);padding:18px;box-shadow:0 1px 2px rgba(0,0,0,.05);margin-bottom:16px}
.panel-hd{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:6px;color:var(--g800)}

/* ── Buttons ── */
.btn{padding:9px 16px;border:none;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn-pri{background:var(--pri);color:#fff}
.btn-out{background:#fff;border:1.5px solid var(--g200);color:var(--g600)}
.btn-err{background:#fff;border:1.5px solid #fee2e2;color:var(--err)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:6px}
.btn-block{width:100%;justify-content:center}

/* ── Upload zone ── */
.upload-zone{
  border:2px dashed var(--g300);border-radius:var(--r);padding:32px;
  text-align:center;cursor:pointer;background:var(--g50);
}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--pri);background:#eef2ff}
.upload-zone .ico{font-size:40px;margin-bottom:8px}
.upload-zone p{font-size:13px;color:var(--g500)}
.upload-zone .sub{font-size:11px;color:var(--g400)}
.upload-progress{margin-top:12px}
.upload-progress .bar{height:6px;background:var(--g200);border-radius:3px;overflow:hidden;margin-bottom:4px}
.upload-progress .fill{height:100%;background:var(--pri);border-radius:3px}
.upload-progress .txt{font-size:11px;color:var(--g500)}

/* ── Table ── */
.vtable{width:100%;border-collapse:collapse;font-size:12px}
.vtable th{text-align:left;padding:8px 10px;background:var(--g50);color:var(--g500);font-weight:600;font-size:11px;border-bottom:2px solid var(--g200);white-space:nowrap}
.vtable td{padding:10px;border-bottom:1px solid var(--g100);vertical-align:middle}
.vtable tr:hover td{background:#eef2ff}
.vname{font-weight:600;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vtable-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.sel-mini{padding:5px 8px;border:1.5px solid var(--g200);border-radius:6px;font-size:11px;background:#fff;color:var(--g700);max-width:130px;cursor:pointer}
.sel-mini:focus{border-color:var(--pri);outline:none}

/* ── 自定义课程选择器（替代原生select，避免截断）── */
.course-picker{flex:1;max-width:200px}
.course-picker-btn{
  width:100%;padding:5px 8px;border:1.5px solid var(--g200);border-radius:6px;
  font-size:11px;background:#fff;color:var(--g700);cursor:pointer;text-align:left;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  display:flex;align-items:center;justify-content:space-between;gap:4px;
}
.course-picker-btn:hover{border-color:var(--pri2)}
.course-picker-btn.open{border-color:var(--pri);box-shadow:0 0 0 2px rgba(245,166,35,.15)}
.course-picker-btn .arrow{font-size:8px;color:var(--g400);transition:transform .2s;flex-shrink:0}
.course-picker-btn.open .arrow{transform:rotate(180deg)}
/* 下拉渲染到 body 级别，fixed 定位防遮挡 */
.course-picker-drop{
  display:none;position:fixed;z-index:9999;
  width:320px;max-height:460px;overflow-y:auto;
  overscroll-behavior:contain;-webkit-overflow-scrolling:touch;
  background:#fff;border:1.5px solid var(--g200);border-radius:var(--r);
  box-shadow:0 8px 30px rgba(0,0,0,.15);
}
.course-picker-drop.show{display:block}
.course-picker-group{padding:6px 0}
.course-picker-glabel{padding:4px 14px;font-size:10px;color:var(--g500);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.course-picker-opt{
  padding:6px 14px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;
  border-left:3px solid transparent;transition:background .15s;
}
.course-picker-opt:hover{background:var(--pri-lt)}
.course-picker-opt.active{background:#eef2ff;border-left-color:var(--pri);font-weight:600;color:var(--g800)}
/* 下拉遮罩，点击关闭 */
.course-picker-backdrop{display:none;position:fixed;inset:0;z-index:9998}
.course-picker-backdrop.show{display:block}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.tag-ok{background:#d1fae5;color:var(--suc)}
.tag-warn{background:#fef3c7;color:var(--warn)}
.tag-err{background:#fee2e2;color:var(--err)}

/* ── Course list ── */
.course-list{display:flex;flex-direction:column;gap:6px}
.course-item{
  display:flex;align-items:center;gap:10px;padding:12px 14px;
  border:1.5px solid var(--g200);border-radius:var(--r);cursor:pointer;
}
.course-item:hover{border-color:var(--pri2);background:#eef2ff}
.course-item.selected{border-color:var(--pri);background:#eef2ff}
.course-item .ci{font-size:22px;flex-shrink:0}
.course-item .ct{flex:1;min-width:0}
.course-item .ctt{font-size:14px;font-weight:700}
.course-item .ctm{font-size:11px;color:var(--g400)}
.course-item .cb{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;flex-shrink:0}
.cb-req{background:#fee2e2;color:var(--err)}
.cb-pro{background:#eef2ff;color:var(--pri)}
.sec-label{font-size:13px;font-weight:700;color:var(--g700);margin:16px 0 8px;padding-left:8px;border-left:3px solid var(--pri)}
.mp{background:var(--g50);border-radius:var(--r);padding:16px;margin-top:12px}
.mph{font-size:14px;font-weight:700;margin-bottom:10px}
.cv{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#fff;border-radius:var(--rs);border:1px solid var(--g200);margin-bottom:6px}
.cv .vt{flex:1;font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cv .vs{font-size:10px;color:var(--g400);flex-shrink:0}
.empty-hint{text-align:center;padding:24px;color:var(--g400);font-size:12px}
.empty-hint .ico{font-size:36px;margin-bottom:6px}

/* ── Stats ── */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.stat-card{background:#fff;border-radius:var(--r);padding:16px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.stat-card .si{font-size:20px;margin-bottom:6px}
.stat-card .sv{font-size:24px;font-weight:900;color:var(--g800)}
.stat-card .sl{font-size:11px;color:var(--g400);margin-top:2px}

/* ── Toast ── */
.toast{
  position:fixed;top:16px;right:16px;z-index:9999;
  padding:10px 18px;border-radius:var(--rs);font-size:13px;font-weight:600;
  color:#fff;animation:si .3s;box-shadow:0 4px 12px rgba(0,0,0,.15);
}
.toast-ok{background:var(--suc)}
.toast-err{background:var(--err)}
.toast-info{background:var(--pri)}
@keyframes si{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:var(--r);width:90%;max-width:500px;max-height:80vh;overflow-y:auto;padding:24px}
.modal h3{font-size:16px;font-weight:700;margin-bottom:14px}
.mclose{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:var(--g400)}

@media(min-width:768px){
  .header{padding:14px 24px}.tabbar{padding:0 24px}
  .tabbar button{padding:13px 20px;font-size:14px}
  .ct{padding:20px 24px 40px}.panel{padding:24px}
}
/* 视频管理表格：移动端下拉更宽 */
@media(max-width:767px){
  .sel-mini{max-width:100%!important;font-size:10px;padding:4px 6px}
  .vtable th:nth-child(2),.vtable td:nth-child(2),
  .vtable th:nth-child(3),.vtable td:nth-child(3){display:none}
  .vtable .vname{max-width:100px}
  .course-picker-drop{width:280px!important;max-height:360px}
  .course-picker{max-width:140px}
}
</style>
</head>

function safeDecode(str){
  if(!str)return str;
  try{
    // 检测是否为 Latin-1 误编码的 UTF-8 字符串（高位字节占比高）
    var hi=0;for(var i=0;i<str.length;i++){var c=str.charCodeAt(i);if(c>127&&c<256)hi++}

}

// ── Init ──
async function init(){
  await detectServer();
  switchTab(0);
}

async function detectServer(){
  isChecking=true;
  // 方案1：如果页面本身从 localhost 加载，用相对路径检测（避免跨域）
  if(window.location.hostname==='localhost'||window.location.hostname==='127.0.0.1'){
    try{
      var r=await fetch('/api/courses',{signal:AbortSignal.timeout(3000)});
      var j=await r.json();
      hasServer=j.ok===true;
      isChecking=false;
      updateModeUI();
      return;
    }catch(e){/* 回退到绝对路径 */}
  }
  // 方案2：绝对路径（从 CloudStudio HTTPS 检测 localhost）
  try{
    var r2=await fetch(API+'/api/courses',{signal:AbortSignal.timeout(3000)});
    var j2=await r2.json();
    hasServer=j2.ok===true;
  }catch(e){hasServer=false}
  isChecking=false;
  updateModeUI();
}

function updateModeUI(){
  var tag=document.getElementById('modeTag');
  var serverStatus = document.getElementById('serverStatus');
  var diagBar = document.getElementById('diagBar');
  var quickStatus = document.getElementById('serverQuickStatus');
  
  if(hasServer){
    tag.textContent='🖥 服务器模式';
    tag.className='mode-badge mode-local';
    document.getElementById('bannerCloud').classList.remove('show');
    document.getElementById('bannerLocal').classList.add('show');
    // 隐藏服务器状态提示条
    if(serverStatus) serverStatus.style.display = 'none';
    // 更新诊断条
    if(diagBar) diagBar.style.background = '#D1FAE5';
    if(quickStatus) quickStatus.innerHTML = '✅ 服务器已连接';
  }else{
    tag.textContent='☁️ 云端模式';
    tag.className='mode-badge mode-cloud';
    document.getElementById('bannerCloud').classList.add('show');
    document.getElementById('bannerLocal').classList.remove('show');
    // 显示服务器状态提示条
    if(serverStatus) serverStatus.style.display = 'block';
    // 更新诊断条
    if(diagBar) diagBar.style.background = '#FEE2E2';
    if(quickStatus) quickStatus.innerHTML = '❌ 服务器未连接';
  }
}

// 手动重试检测（用户点击"重新检测"按钮）
async function retryDetect(){
  document.getElementById('retryBtn').textContent='⏳ 检测中...';
  document.getElementById('retryBtn').disabled=true;
  await detectServer();
  renderVideoTab(); // 刷新上传区域
  loadVideos();     // 刷新视频列表
}

// ── Toast ──
function toast(msg,type){
  type=type||'info';
  var t=document.createElement('div');
  t.className='toast toast-'+type;t.textContent=msg;document.body.appendChild(t);
  setTimeout(function(){t.remove()},3000);
}

// ── Tab Switch ──
var currentTab=0;
function switchTab(idx){
  currentTab=idx;
  document.querySelectorAll('.tabbar button').forEach(function(b,i){b.classList.toggle('active',i===idx)});
  if(idx===0)renderVideoTab();
  else if(idx===1)renderMatchTab();
  else if(idx===2)renderDataTab();
  else if(idx===3)renderCampTab();
}

          '请确保电脑端已启动本地服务，然后通过以下方式访问：'+
        '</p>'+
        '<div style="display:flex;flex-direction:column;gap:8px">'+
          '<a href="http://localhost:3000/admin_v2.html" style="display:block;text-align:center;padding:10px 16px;background:var(--pri);color:#fff;border-radius:var(--rs);font-size:13px;font-weight:600;text-decoration:none">🔗 打开本地管理后台</a>'+
          '<button class="btn btn-out btn-sm" id="retryBtn" onclick="retryDetect()" style="justify-content:center">🔄 重新检测本地服务</button>'+
        '</div>'+
        '<p style="font-size:11px;color:#92400e;margin-top:12px;text-align:center">如无法打开，请确认已在 <b>kataichi-server</b> 目录运行 <code>node server.js</code></p>'+
      '</div>'+
    '</div>';
  }

  // 视频列表（双模式通用）
  h+='<div class="panel">'+
    '<div class="panel-hd">🎬 已管理视频 <span style="font-weight:400;color:var(--g400);font-size:12px;margin-left:6px" id="videoCount"></span></div>'+
    '<div id="videoList">加载中...</div>'+
  '</div>';
  document.getElementById('content').innerHTML=h;

  if(hasServer){
    var zone=document.getElementById('dropZone');
    if(zone){
      zone.addEventListener('dragover',function(e){e.preventDefault();zone.classList.add('dragover')});
      zone.addEventListener('dragleave',function(){zone.classList.remove('dragover')});
      zone.addEventListener('drop',function(e){e.preventDefault();zone.classList.remove('dragover');
        var f=e.dataTransfer.files[0];if(f)uploadVideo(f);
      });
    }
  }
  loadVideos();
}

async function uploadVideo(file){
  if(!file){toast('请选择文件','err');return}
  if(file.size>500*1024*1024){toast('文件超过500MB限制','err');return}

  var pdiv=document.getElementById('uploadProgress');
  var fill=document.getElementById('progressFill');
  var txt=document.getElementById('progressTxt');
  pdiv.style.display='block';fill.style.width='0%';txt.textContent='上传中...';

  var fd=new FormData();fd.append('video',file);
  try{
    var r=await new Promise(function(resolve,reject){
      var xhr=new XMLHttpRequest();
      xhr.upload.addEventListener('progress',function(e){
        if(e.lengthComputable){var pct=Math.round(e.loaded/e.total*100);fill.style.width=pct+'%';txt.textContent='上传中 '+pct+'%'}
      });
      xhr.addEventListener('load',function(){resolve(xhr)});
      xhr.addEventListener('error',function(){reject(new Error('网络错误'))});
      xhr.open('POST',API+'/api/videos/upload');xhr.send(fd);
    });
    var j=JSON.parse(r.responseText);
    if(j.ok){toast('上传成功','ok');loadVideos()}else{toast(j.msg||'上传失败','err')}
  }catch(e){toast('上传失败: '+e.message,'err')}
  setTimeout(function(){pdiv.style.display='none';fill.style.width='0%'},2000);
}

// ── 自定义课程选择器（body 级 portal，position:fixed 防遮挡）──
var _pickerVideoId = null;
var _pickerBtnEl = null;

function buildCoursePickerBtn(videoId, selectedId) {
  selectedId = selectedId || null;
  var sel = EMBED_COURSES.find(function(c) { return c.id === selectedId; });
  var label = sel ? (sel.icon || '') + ' ' + sel.title : '选择课程';
  return '<div class="course-picker">' +
    '<div class="course-picker-btn" id="cpbtn_' + videoId + '" ' +
    'onclick="toggleCoursePicker(' + videoId + ',event)" ' +
    'title="' + escHtml(label) + '">' +
    '<span style="overflow:hidden;text-overflow:ellipsis">' + escHtml(label) + '</span>' +
    '<span class="arrow">▼</span></div></div>';
}

function toggleCoursePicker(videoId, event) {
  event.stopPropagation();
  var drop = document.getElementById('cpDrop');
  var backdrop = document.getElementById('cpBackdrop');
  var btn = document.getElementById('cpbtn_' + videoId);
  var isSame = _pickerVideoId === videoId && drop.classList.contains('show');

  // 关闭当前
  closeAllPickers();

  if (isSame) return;

  // 打开新的
  _pickerVideoId = videoId;
  _pickerBtnEl = btn;

  // 查找已选中的课程ID（从按钮 label 反查）
  var selectedId = null;
  if (btn) {
    var spanText = btn.querySelector('span').textContent.trim();
    var found = EMBED_COURSES.find(function(c) {
      return ((c.icon || '') + ' ' + c.title).trim() === spanText;
    });
    if (found) selectedId = found.id;
  }

  // 构建下拉HTML
  var h = '';
  // 必修课
  h += '<div class="course-picker-group"><div class="course-picker-glabel">🏛️ 企业文化必修课</div>';
  EMBED_COURSES.filter(function(c) { return c.cat === 'required' && c.id >= 1 && c.id <= 102; }).forEach(function(c) {
    h += '<div class="course-picker-opt' + (c.id === selectedId ? ' active' : '') +
      '" onclick="pickCourse(' + videoId + ',' + c.id + ')">' +
      c.icon + ' ' + c.title + '</div>';
  });
  h += '</div>';

  // 专业课按岗位分组
  var positions = ['销售顾问', '数字化营销师', '检测评估师', '金融专员', '维修技师', '店长/储备干部'];
  positions.forEach(function(pos) {
    var courses = EMBED_COURSES.filter(function(c) { return c.cat === 'professional' && c.pos === pos; });
    if (!courses.length) return;
    h += '<div class="course-picker-group"><div class="course-picker-glabel">🎯 ' + escHtml(pos) + '</div>';
    courses.forEach(function(c) {
      h += '<div class="course-picker-opt' + (c.id === selectedId ? ' active' : '') +
        '" onclick="pickCourse(' + videoId + ',' + c.id + ')">' +
        c.icon + ' ' + c.title + '</div>';
    });
    h += '</div>';
  });

  drop.innerHTML = h;

  // 定位：计算按钮在视口中的位置
  if (btn) {
    var rect = btn.getBoundingClientRect();
    var dropW = 320;
    var left = rect.left;
    if (left + dropW > window.innerWidth - 10) left = window.innerWidth - dropW - 10;
    if (left < 10) left = 10;
    drop.style.left = left + 'px';
    drop.style.top = (rect.bottom + 4) + 'px';
    drop.style.width = dropW + 'px';
  } else {
    drop.style.left = '20px';
    drop.style.top = '100px';
  }

  drop.classList.add('show');
  backdrop.classList.add('show');
  if (btn) btn.classList.add('open');

  // 阻止滚轮事件冒泡到window，避免触发scroll监听导致下拉关闭
  drop.onwheel = function(e) { e.stopPropagation(); };
}

function closeAllPickers() {
  var drop = document.getElementById('cpDrop');
  var backdrop = document.getElementById('cpBackdrop');
  if (drop) drop.classList.remove('show');
  if (backdrop) backdrop.classList.remove('show');
  if (_pickerBtnEl) { _pickerBtnEl.classList.remove('open'); _pickerBtnEl = null; }
  _pickerVideoId = null;
}

function pickCourse(videoId, courseId) {
  var c = EMBED_COURSES.find(function(x) { return x.id === courseId; });
  var label = c ? (c.icon || '') + ' ' + c.title : '选择课程';
  var btn = document.getElementById('cpbtn_' + videoId);
  if (btn) {
    btn.querySelector('span').textContent = label;
    btn.title = label;
  }
  // 存储选择
  window['_pick_cid_' + videoId] = courseId;
  // 更新章节下拉
  updateChapterSelect(videoId, courseId);
  // 关闭
  closeAllPickers();
}

// 全局：点击 esc 关闭
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeAllPickers(); });
// 全局：窗口滚动/调整时关闭
window.addEventListener('scroll', function(e) {
  if (_pickerVideoId) {
    var drop = document.getElementById('cpDrop');
    // 下拉面板内部滚动不关闭（scroll事件不冒泡，但捕获阶段会传播）
    if (drop && (e.target === drop || drop.contains(e.target))) return;
    closeAllPickers();
  }
});
window.addEventListener('resize', function() { if (_pickerVideoId) closeAllPickers(); });

// ── 章节下拉构建器（显示实际章节名）──
function buildChapterDropdown(courseId, selectedSec){
  var opts='<option value="">不指定章节</option>';
  if(!courseId)return opts;
  var c=EMBED_COURSES.find(function(x){return x.id===parseInt(courseId)});
  if(c&&c.sections){
    c.sections.forEach(function(s,i){
      var label='§'+(i+1)+' '+s;
      opts+='<option value="'+i+'"'+(i===selectedSec?' selected':'')+'>'+label+'</option>';
    });
  }
  return opts;
}

function loadVideos(){
  if(hasServer){loadVideosServer();return}
  // 云端模式：从localStorage加载
  var mappings=getLocalMappings();
  var entries=[];
  var seen={};
  mappings.forEach(function(m){
    if(!seen[m.videoId]){
      seen[m.videoId]={id:m.videoId,name:m.videoName||('视频#'+m.videoId),size:m.videoSize||0,linkedCourseId:m.courseId,linkedSection:m.section};
    }
  });
  // 统计关联数
  var linkedCount={};
  mappings.forEach(function(m){linkedCount[m.videoId]=(linkedCount[m.videoId]||0)+1});
  Object.keys(seen).forEach(function(k){seen[k].linked=linkedCount[parseInt(k)]||0});
  renderVideoTable(Object.values(seen));
}

async function loadVideosServer(){
  try{
    var r=await fetch(API+'/api/videos');var j=await r.json();
    var videos=j.data||[];
    var mappings=(await loadServerMappings())||[];
    // 为每个视频匹配第一个关联的课程信息
    videos.forEach(function(v){
      var linkedMappings=mappings.filter(function(m){return m.videoId===v.id});
      v.linked=linkedMappings.length;
      if(linkedMappings.length>0){v.linkedCourseId=linkedMappings[0].courseId;v.linkedSection=linkedMappings[0].section}
    });
    renderVideoTable(videos.map(function(v){
      return {id:v.id,name:v.originalName,size:v.size,time:v.uploadedAt,linked:v.linked,url:v.url,linkedCourseId:v.linkedCourseId,linkedSection:v.linkedSection};
    }));
  }catch(e){document.getElementById('videoList').innerHTML='<div class="empty-hint"><div class="ico">⚠️</div><p>无法加载视频列表</p></div>'}
}

function renderVideoTable(entries){
  document.getElementById('videoCount').textContent='共 '+entries.length+' 个';
  if(!entries.length){document.getElementById('videoList').innerHTML='<div class="empty-hint"><div class="ico">📭</div><p>暂无视频</p></div>';return}

  var h='<div class="vtable-wrap"><table class="vtable"><thead><tr><th>视频</th><th>大小</th><th>上传时间</th><th>关联状态</th><th style="min-width:260px">关联到课程</th><th>操作</th></tr></thead><tbody>';
  entries.forEach(function(v){
    var size=v.size?(v.size/1024/1024).toFixed(1)+' MB':'未知';
    var time=v.time?v.time.slice(0,16).replace('T',' '):(hasServer?'-':'本地记录');
    var linked=v.linked||0;
    var vname=safeDecode(v.name);
    var linkedCourse=v.linkedCourseId?EMBED_COURSES.find(function(c){return c.id===v.linkedCourseId}):null;
    var linkedTagHtml=linkedCourse
      ?'<span class="tag tag-ok" id="linkTag_'+v.id+'" title="'+linkedCourse.title+'">'+linkedCourse.icon+' '+linkedCourse.title+'</span>'
      :'<span class="tag tag-warn" id="linkTag_'+v.id+'">未关联</span>';

    h+='<tr id="videoRow_'+v.id+'">'+
      '<td><div class="vname" title="'+vname+'">'+vname+'</div></td>'+
      '<td style="font-size:11px;color:var(--g400)">'+size+'</td>'+
      '<td style="font-size:11px;color:var(--g500)">'+time+'</td>'+
      '<td id="linkStatus_'+v.id+'">'+linkedTagHtml+'</td>'+
      '<td><div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">'+
        buildCoursePickerBtn(v.id, v.linkedCourseId || null)+
        '<select class="sel-mini" id="secSel_'+v.id+'" style="flex:1;max-width:130px">'+buildChapterDropdown(v.linkedCourseId||null, v.linkedSection)+'</select>'+
        (linkedCourse?'<button class="btn btn-xs btn-err" id="linkBtn_'+v.id+'" onclick="unlinkVideoFromTab('+v.id+','+linkedCourse.id+')" title="取消关联">取消关联</button>':'<button class="btn btn-xs btn-pri" id="linkBtn_'+v.id+'" onclick="linkVideoFromTab('+v.id+')" title="关联到所选课程">关联</button>')+
      '</div></td>'+
      '<td><div style="display:flex;gap:4px">';
    if(hasServer&&v.url)h+='<a href="'+API+v.url+'" target="_blank" class="btn btn-xs btn-out">▶</a>';
    h+='<button class="btn btn-xs btn-err" onclick="deleteVideo('+v.id+')" title="删除此视频">删除</button></div></td></tr>';
  });
  h+='</tbody></table></div>';
  document.getElementById('videoList').innerHTML=h;

  // 章节选择器 change
  entries.forEach(function(v){
    var secSel = document.getElementById('secSel_' + v.id);
    if (secSel) {
      secSel.addEventListener('change', function() { /* 不需要额外操作，linkVideoFromTab 会读取 */ });
    }
  });
}

// 根据选中的课程动态更新章节下拉（显示真实章节名）
function updateChapterSelect(videoId,courseId){
  var secSel=document.getElementById('secSel_'+videoId);
  if(!secSel)return;
  secSel.innerHTML=buildChapterDropdown(courseId?parseInt(courseId):null, null);
}

// ── 从视频管理Tab直接关联视频到课程 ──
async function linkVideoFromTab(videoId){
  var courseId = window['_pick_cid_' + videoId];
  if (!courseId) { toast('请先选择目标课程', 'err'); return; }
  var secSel = document.getElementById('secSel_' + videoId);
  var section = secSel && secSel.value !== '' ? parseInt(secSel.value) : null;

  // 显示加载中
  var btn=document.getElementById('linkBtn_'+videoId);
  if(btn){btn.textContent='⏳';btn.disabled=true}

  var course=EMBED_COURSES.find(function(c){return c.id===courseId});
  var courseLabel=course?course.icon+' '+course.title:('课程#'+courseId);

  if(hasServer){
    var body={videoId:videoId};
    if(section!=null)body.section=section;
    try{
      var r=await fetch(API+'/api/courses/'+courseId+'/videos',{
        method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)
      });
      var j=await r.json();
      if(j.ok){
        toast(courseLabel+' 关联成功','ok');
        serverMappingsCache=null;
        // 即时更新该行状态（不刷新整个表格）
        updateVideoRowStatus(videoId,courseId,courseLabel);
      }else{toast(j.msg||'关联失败','err');if(btn){btn.textContent='关联';btn.disabled=false}}
    }catch(e){toast('关联失败: '+e.message,'err');if(btn){btn.textContent='关联';btn.disabled=false}}
  }else{
    var vname = courseLabel;
    addLocalMapping(courseId,videoId,vname||courseLabel,section,Date.now());
    toast(courseLabel+' 关联成功','ok');
    updateVideoRowStatus(videoId,courseId,courseLabel);
  }
}

// 即时更新一行的关联状态（不刷新整个表格）
function updateVideoRowStatus(videoId,courseId,courseLabel){
  // 更新关联状态标签
  var statusCell=document.getElementById('linkStatus_'+videoId);
  if(statusCell){
    statusCell.innerHTML='<span class="tag tag-ok">'+courseLabel+'</span>';
  }
  // 切换按钮：关联→取消关联（用 onclick 直接绑定）
  var btn=document.getElementById('linkBtn_'+videoId);
  if(btn){
    btn.textContent='取消关联';
    btn.disabled=false;
    btn.className='btn btn-xs btn-err';
    btn.title='取消关联';
    btn.setAttribute('onclick','unlinkVideoFromTab('+videoId+','+courseId+')');
  }
  // 短暂闪烁提示
  var row=document.getElementById('videoRow_'+videoId);
  if(row){row.style.background='#d1fae5';setTimeout(function(){row.style.background=''},1500)}
}

// ── 从视频管理Tab取消关联 ──
async function unlinkVideoFromTab(videoId,courseId){
  if(!confirm('确定要取消此视频与课程的关联吗？'))return;
  var btn=document.getElementById('linkBtn_'+videoId);
  if(btn){btn.textContent='⏳';btn.disabled=true}

  if(hasServer){
    try{
      var r=await fetch(API+'/api/courses/'+courseId+'/videos/'+videoId,{method:'DELETE'});
      var j=await r.json();
      if(j.ok){
        toast('已取消关联','ok');
        serverMappingsCache=null;
        loadVideos();
      }else{toast(j.msg||'操作失败','err');if(btn){btn.textContent='已关联';btn.disabled=false;btn.className='btn btn-xs btn-out'}}
    }catch(e){toast('操作失败: '+e.message,'err');if(btn){btn.textContent='已关联';btn.disabled=false;btn.className='btn btn-xs btn-out'}}
  }else{
    removeLocalMapping(courseId,videoId);
    toast('已取消关联','ok');
    loadVideos();
  }
}

function deleteVideo(id){
  if(!confirm('确定要删除吗？此操作不可恢复。'))return;
  if(hasServer){
    fetch(API+'/api/videos/'+id,{method:'DELETE'}).then(function(r){return r.json()}).then(function(j){
      if(j.ok){toast('已删除','ok');loadVideos()}else toast(j.msg||'删除失败','err')
    }).catch(function(){toast('删除失败','err')});
  }else{
    removeLocalMappingByVideo(id);
    toast('已删除','ok');loadVideos();
  }
}

var selectedCourseId=null;

function renderMatchTab(){
  var required=EMBED_COURSES.filter(function(c){return c.cat==='required'});
  var professional=EMBED_COURSES.filter(function(c){return c.cat==='professional'});
  var positions=['销售顾问','数字化营销师','检测评估师','金融专员','维修技师','店长/储备干部'];

  var h='<div class="panel">'+
    '<div class="panel-hd">🔗 为课程匹配教学视频</div>'+
    '<p style="font-size:12px;color:var(--g500);margin-bottom:16px">选中目标课程后，从视频库中选择视频进行关联'+
    (hasServer?'':' <span style="color:#92400e">（云端模式：使用本地记录）</span>')+'</p>';

    h+='</div>';
  });

function courseItemHtml(c){
  var catClass=c.cat==='required'?'cb-req':'cb-pro';

function selectCourse(id){
  selectedCourseId=id;
  document.querySelectorAll('.course-item').forEach(function(el){el.classList.toggle('selected',el.dataset.id===String(id))});
  document.getElementById('matchDetail').innerHTML='<div class="empty-hint" style="padding:20px"><p>⏳ 加载中...</p></div>';
  renderMatchDetail();
}

async function renderMatchDetail(){
  var c=EMBED_COURSES.find(function(x){return x.id===selectedCourseId});
  if(!c)return;

  var linked=[];
  var allVideos=[];

  if(hasServer){
    try{
      // 强制刷新服务端数据（清除缓存保证最新）
      serverMappingsCache=null;
      var sr=await loadServerMappings();
      linked=sr.filter(function(m){return m.courseId===selectedCourseId});
      // 补充视频名称：从 videos.json 中查找 videoName
      var r=await fetch(API+'/api/videos');var j=await r.json();
      allVideos=j.data||[];
      // 给 linked 补充视频名称字段
      linked.forEach(function(m){
        var v=allVideos.find(function(x){return x.id===m.videoId});
        if(v)m.videoName=v.originalName||v.filename||('视频#'+m.videoId);
        else m.videoName='视频#'+m.videoId;
      });
    }catch(e){console.error('renderMatchDetail server error:',e);allVideos=[]}
  }else{
    linked=getLocalMappings().filter(function(m){return m.courseId===selectedCourseId});
    allVideos=getLocalVideos();
  }

  var h='<div class="panel mp"><div class="mph">📋 ' + c.icon + ' ' + c.title +
    '<span style="font-size:11px;color:var(--g400);font-weight:400;margin-left:8px">'+(c.pos||'全员')+' · '+c.sections.length+'节 · 已关联'+linked.length+'个</span></div>';

  // 已关联视频
  if(linked.length){
    h+='<div style="font-size:12px;font-weight:600;margin-bottom:6px;color:var(--g700)">已关联视频：</div>';
    linked.forEach(function(m){
      var secLabel=m.section!=null?'章节'+(m.section+1):'';

      h+='<div class="cv">'+

        '<span class="vt">'+vname+'</span>'+
        (secLabel?'<span class="tag tag-ok">'+secLabel+'</span>':'')+
        '<button class="btn btn-xs btn-err" onclick="unlinkVideo('+selectedCourseId+','+m.videoId+')">✕ 移除</button>'+
      '</div>';
    });
  }else{
    h+='<div class="empty-hint"><div class="ico">📭</div><p>该课程尚未关联视频</p></div>';

  // 添加关联（有未关联视频时）

    return !linked.some(function(m){return m.videoId===v.id});

      '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">'+
      '<select id="videoSelect" style="padding:8px 10px;border:1.5px solid var(--g200);border-radius:var(--rs);font-size:12px;flex:1;min-width:140px">';
    unlinked.forEach(function(v){
      var vname=safeDecode(v.originalName||v.name||('视频#'+v.id));
      h+='<option value="'+v.id+'">'+vname+'</option>';
    });
    h+='</select>'+
      '<select id="sectionSelect" style="padding:8px 10px;border:1.5px solid var(--g200);border-radius:var(--rs);font-size:12px">'+
      '<option value="">不指定章节</option>';
    c.sections.forEach(function(s,i){
      h+='<option value="'+i+'">章节'+(i+1)+': '+s+'</option>';
    });
    h+='</select>'+
      '<button class="btn btn-pri btn-sm" onclick="linkVideo()">🔗 关联</button></div>';
  }else if(!hasServer){
    h+='<div class="empty-hint" style="margin-top:12px"><p>暂无可关联视频</p><p style="font-size:11px">请先在下方手动添加视频记录，或在电脑端管理后台上传视频文件</p></div>';
  }else{
    h+='<div class="empty-hint" style="margin-top:12px"><p>视频库为空或全部已关联</p><p style="font-size:11px">请先在"视频管理"Tab上传视频文件</p></div>';
  }

  // 手动添加视频名称（云端模式）
  if(!hasServer){

async function linkVideo(){
  var sel=document.getElementById('videoSelect');if(!sel){toast('请先选择视频','err');return}
  var vid=parseInt(sel.value);
  var sec=document.getElementById('sectionSelect');var section=sec?sec.value:'';
  if(!vid||isNaN(vid)){toast('请选择有效视频','err');return}

  if(hasServer){
    var body={videoId:vid};
    if(section!=='')body.section=parseInt(section);
    try{
      var r=await fetch(API+'/api/courses/'+selectedCourseId+'/videos',{
        method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)
      });
      var j=await r.json();
      if(j.ok){
        toast('关联成功','ok');
        serverMappingsCache=null;  // 清除缓存
        renderMatchDetail();
      }else toast(j.msg||'关联失败','err')
    }catch(e){toast('关联失败: '+e.message,'err')}
  }else{
    var name=sel.options[sel.selectedIndex].text;
    addLocalMapping(selectedCourseId,vid,name,section!==''?parseInt(section):null);
    toast('关联成功','ok');renderMatchDetail();
  }
}

function unlinkVideo(courseId,videoId){
  if(!confirm('确定要移除此视频关联吗？'))return;
  if(hasServer){
    fetch(API+'/api/courses/'+courseId+'/videos/'+videoId,{method:'DELETE'}).then(function(r){return r.json()}).then(function(j){
      if(j.ok){
        toast('已移除','ok');
        serverMappingsCache=null;  // 清除缓存
        renderMatchDetail();
      }else toast(j.msg||'操作失败','err')
    }).catch(function(){toast('操作失败','err')});
  }else{
    removeLocalMapping(courseId,videoId);
    toast('已移除','ok');renderMatchDetail();
  }
}

function manualAddVideo(courseId){
  var name=document.getElementById('manualVname').value.trim();
  var sec=document.getElementById('manualSec').value;
  if(!name){toast('请输入视频名称','err');return}
  var nextId=Date.now();
  addLocalMapping(courseId,nextId,name,sec!==''?parseInt(sec):null,Date.now());
  toast('已添加','ok');renderMatchDetail();
}

var LOCAL_MAP_KEY='kataichi_admin_mappings';

function getLocalMappings(){
  try{return JSON.parse(localStorage.getItem(LOCAL_MAP_KEY))||[]}catch(e){return[]}
}
function saveLocalMappings(arr){
  localStorage.setItem(LOCAL_MAP_KEY,JSON.stringify(arr));
}
function addLocalMapping(courseId,videoId,videoName,section,size){
  var arr=getLocalMappings();
  arr.push({courseId:courseId,videoId:videoId,videoName:videoName||('视频#'+videoId),section:section!=null?section:null,videoSize:size||0,updatedAt:new Date().toISOString()});
  saveLocalMappings(arr);
}
function removeLocalMapping(courseId,videoId){
  var arr=getLocalMappings().filter(function(m){return !(m.courseId===courseId&&m.videoId===videoId)});
  saveLocalMappings(arr);
}
function removeLocalMappingByVideo(videoId){
  var arr=getLocalMappings().filter(function(m){return m.videoId!==videoId});
  saveLocalMappings(arr);
}
function getLocalVideos(){
  var seen={};var result=[];
  getLocalMappings().forEach(function(m){
    if(!seen[m.videoId]){seen[m.videoId]=true;result.push({id:m.videoId,name:m.videoName,originalName:m.videoName,size:m.videoSize})}
  });
  return result;
}

// Server mappings cache
var serverMappingsCache=null;
async function loadServerMappings(){
  if(serverMappingsCache)return serverMappingsCache;
  try{var r=await fetch(API+'/api/courses');var j=await r.json();
    if(j.ok){var all=[];j.data.forEach(function(c){if(c.linkedVideos)c.linkedVideos.forEach(function(m){m.courseId=c.id;all.push(m)})});
    serverMappingsCache=all;return all}
    return[];
  }catch(e){return[]}
}

function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function normalizeContentUrls(content) {
  var result = String(content||'');
  // 移除 http://localhost:PORT/ 前缀
  result = result.replace(/https?:\/\/localhost:\d+\//gi, '/');
  // 移除 file:/// 绝对路径前缀（Windows 和 Unix 风格）
  result = result.replace(/file:\/\/\/[^\s\"'>]+?\/(uploads\/covers\/[^\s\"'>]+)/gi, '/$1');
  result = result.replace(/file:\/\/\/[^\s\"'>]+(uploads\/covers\/[^\s\"'>]+)/gi, '/$1');
  // 清理从 Word/富文本复制时带入的多余标签
  result = result.replace(/<!--StartFragment-->|<!--EndFragment-->/gi, '');
  result = result.replace(/<\/?html[^>]*>|<\/?head[^>]*>|<\/?body[^>]*>/gi, '');
  // 确保 uploads/covers/ 路径以 / 开头（绝对路径）
  result = result.replace(/src="(?!http|https|\/)(uploads\/covers\/)/gi, 'src="/$1');
  return result;
}

          '<div><label style="font-size:12px;font-weight:700;color:var(--g600);display:block;margin-bottom:6px">培训天数</label>'+
          '<input id="camp_days" type="number" min="1" placeholder="2" value="'+(article&&article.days!=null?article.days:'')+'\" style="width:100%;padding:10px 13px;border:1.5px solid var(--g200);border-radius:8px;font-size:13px;outline:none;font-family:inherit"></div>'+
        '</div>'+
        '<div style="display:grid;grid-template-columns:2fr 1fr;gap:12px">'+
          '<div><label style="font-size:12px;font-weight:700;color:var(--g600);display:block;margin-bottom:6px">培训地点</label>'+
          '<input id="camp_location" type="text" placeholder="例：上海总部培训中心" value="'+escH(article?article.location:'')+'\" style="width:100%;padding:10px 13px;border:1.5px solid var(--g200);border-radius:8px;font-size:13px;outline:none;font-family:inherit"></div>'+
          '<div><label style="font-size:12px;font-weight:700;color:var(--g600);display:block;margin-bottom:6px">参训人数</label>'+
          '<input id="camp_people" type="number" min="1" placeholder="20" value="'+(article&&article.people!=null?article.people:'')+'\" style="width:100%;padding:10px 13px;border:1.5px solid var(--g200);border-radius:8px;font-size:13px;outline:none;font-family:inherit"></div>'+
        '</div>'+
        '<div><label style="font-size:12px;font-weight:700;color:var(--g600);display:block;margin-bottom:6px">封面图片 <span style="font-weight:400;color:var(--g400)">（可选，点击上传本地照片）</span></label>'+
        '<input id="camp_cover_file" type="file" accept="image/*" style="display:none" onchange="handleCampCoverChange(this)">'+
        '<input id="camp_cover" type="hidden" value="'+escH(article?article.cover:'')+'">'+
        '<div id="camp_cover_area" style="display:flex;align-items:center;gap:12px">'+
          (article&&article.cover
            ? '<img id="camp_cover_preview" src="'+escH(article.cover)+'" style="width:120px;height:68px;object-fit:cover;border-radius:8px;border:1px solid var(--g200)" onerror="this.style.display=\'none\'">'
            : '<div id="camp_cover_placeholder" style="width:120px;height:68px;border:2px dashed var(--g300);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--g400);font-size:24px;flex-shrink:0">+</div>')+
          '<button type="button" class="btn btn-out btn-sm" onclick="document.getElementById(\'camp_cover_file\').click()">选择图片</button>'+
          (article&&article.cover?'<button type="button" class="btn btn-out btn-sm" style="color:var(--err);border-color:#FEE2E2" onclick="clearCampCover()">移除</button>':'')+
        '</div></div>'+
        '<div>'+
          '<label style="font-size:12px;font-weight:700;color:var(--g600);display:block;margin-bottom:6px">图文正文 <span style="font-weight:400;color:var(--g400)">（Ctrl+V 粘贴HTML会自动保留格式，也可手动编写）</span></label>'+
          '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'+
            '<textarea id="camp_content" rows="16" placeholder="&lt;h2&gt;培训概况&lt;/h2&gt;\n&lt;p&gt;本次集训营...&lt;/p&gt;\n\n&lt;h2&gt;培训亮点&lt;/h2&gt;\n&lt;ul&gt;&lt;li&gt;...&lt;/li&gt;&lt;/ul&gt;" style="width:100%;padding:12px;border:1.5px solid var(--g200);border-radius:8px;font-size:12px;outline:none;font-family:Consolas,monospace;resize:vertical;line-height:1.6">'+contentVal+'</textarea>'+
            '<div style="background:#f9fafb;border:1px solid var(--g200);border-radius:8px;padding:12px;font-size:11px;color:var(--g500);line-height:2;overflow-y:auto">'+
              '<b style="color:var(--g700)">HTML速查</b><br>'+
              '<code style="background:#eef2ff;padding:1px 4px;border-radius:3px">&lt;h2&gt;章节标题&lt;/h2&gt;</code><br>'+
              '<code style="background:#eef2ff;padding:1px 4px;border-radius:3px">&lt;h3&gt;小标题&lt;/h3&gt;</code><br>'+
              '<code style="background:#eef2ff;padding:1px 4px;border-radius:3px">&lt;p&gt;段落&lt;/p&gt;</code><br>'+
              '<code style="background:#eef2ff;padding:1px 4px;border-radius:3px">&lt;strong&gt;加粗&lt;/strong&gt;</code><br>'+
              '<code style="background:#eef2ff;padding:1px 4px;border-radius:3px">&lt;em&gt;紫色强调&lt;/em&gt;</code><br>'+
              '<code style="background:#eef2ff;padding:1px 4px;border-radius:3px">&lt;ul&gt;&lt;li&gt;列表&lt;/li&gt;&lt;/ul&gt;</code><br>'+
              '<code style="background:#eef2ff;padding:1px 4px;border-radius:3px">&lt;ol&gt;&lt;li&gt;有序&lt;/li&gt;&lt;/ol&gt;</code><br>'+
              '<code style="background:#eef2ff;padding:1px 4px;border-radius:3px">&lt;img src="图片URL"&gt;</code><br>'+
              '<code style="background:#eef2ff;padding:1px 4px;border-radius:3px">&lt;blockquote&gt;引用&lt;/blockquote&gt;</code><br>'+
              '<code style="background:#eef2ff;padding:1px 4px;border-radius:3px">&lt;hr&gt;</code> 分割线<br>'+
              '<div style="margin-top:6px;background:#FFF3E0;border-radius:6px;padding:8px;color:#92400E">'+
                '🖼 图片画廊：<br>'+
                '<code>&lt;div class="aw-gallery"&gt;<br>&lt;img src="1.jpg"&gt;&lt;img src="2.jpg"&gt;<br>&lt;/div&gt;</code>'+
              '</div>'+
              '<div style="margin-top:6px;background:#F3EEFF;border-radius:6px;padding:8px;color:#5b21b6">'+
                '✨ 高亮框：<br>'+
                '<code>&lt;div class="highlight-box"&gt;<br>&lt;p&gt;重点内容&lt;/p&gt;&lt;/div&gt;</code>'+
              '</div>'+
            '</div>'+
          '</div>'+
        '</div>'+
        '<div style="display:flex;align-items:center;gap:10px">'+
          '<input type="checkbox" id="camp_top" '+(article&&article.top?'checked':'')+' style="width:16px;height:16px;accent-color:#7C3AED">'+
          '<label for="camp_top" style="font-size:13px;font-weight:600;color:var(--g700);cursor:pointer">置顶此培训（显示在列表最前面）</label>'+
        '</div>'+
        '<div style="display:flex;justify-content:flex-end;gap:10px;padding-top:8px;border-top:1px solid var(--g100)">'+
          '<button onclick="closeCampEditor()" class="btn btn-out">取消</button>'+
          '<button onclick="saveCampArticle()" class="btn btn-pri" style="background:#7C3AED">💾 保存发布</button>'+
        '</div>'+
      '</div>'+
    '</div>';

  document.body.appendChild(modal);
  modal.addEventListener('click',function(e){if(e.target===modal)closeCampEditor()});

  // 还原textarea内的原始HTML（textarea里显示的是源码）
  if(article && article.content){
    document.getElementById('camp_content').value = article.content;
  }
  // 拦截粘贴事件：用户从浏览器复制富文本后粘贴进textarea时，写入HTML源码而非纯文本
  var ta = document.getElementById('camp_content');
  ta.addEventListener('paste', function(e) {
    var html = (e.clipboardData || window.clipboardData).getData('text/html');
    if (html) {
      e.preventDefault();
      // 美化格式：每个标签后换行
      html = html.replace(/(<(?!img\b)[^>]*>)(?=\s*<)/g, '$1\n');
      html = html.replace(/>\s*</g, '>\n<');
      // 插入到光标位置
      var s = ta.selectionStart;
      var v = ta.value;
      ta.value = v.substring(0, s) + html + v.substring(ta.selectionEnd);
      ta.selectionStart = ta.selectionEnd = s + html.length;
    }
  });
  document.getElementById('camp_title').focus();
}

function closeCampEditor(){
  var m=document.getElementById('campEditorModal');
  if(m) m.remove();
}

function handleCampCoverChange(input){
  console.log('=== handleCampCoverChange called ===');
  var file = input.files && input.files[0];
  if(!file){
    console.log('No file selected');
    return;
  }
  console.log('File selected:', file.name, 'Size:', file.size, 'Type:', file.type);
  
  var area = document.getElementById('camp_cover_area');
  if(!area){
    console.error('camp_cover_area not found');
    toast('页面元素缺失，请刷新页面','err');
    return;
  }
  
  // 显示上传中状态
  var ph = document.getElementById('camp_cover_placeholder');
  var prev = document.getElementById('camp_cover_preview');
  console.log('Placeholder found:', !!ph, 'Preview found:', !!prev);
  
  if(ph) ph.innerHTML = '<span style="font-size:12px;color:var(--g400)">⏳ 上传中...</span>';
  if(prev) { prev.style.opacity = '0.4'; prev.style.filter = 'blur(1px)'; }
  
  // 上传到服务器
  var form = new FormData();
  form.append('image', file);
  console.log('Sending upload request...');
  
  fetch('/api/camp/upload-image', {method:'POST',body:form})
    .then(function(r){
      console.log('Response status:', r.status);
      if(!r.ok){
        throw new Error('服务器返回错误: '+r.status);
      }
      return r.json();
    })
    .then(function(data){
      console.log('Response data:', data);
      if(data.ok){
        var url = data.data.url;
        console.log('Upload success, URL:', url);
        
        // 更新隐藏的 input 值
        var coverInput = document.getElementById('camp_cover');
        if(coverInput) coverInput.value = url;
        
        // 更新预览 — 优先 loc 占位区，其次更新已有图片 src
        var phNow = document.getElementById('camp_cover_placeholder');
        var prevNow = document.getElementById('camp_cover_preview');
        
        if(phNow) {
          console.log('Replacing placeholder with preview image');
          phNow.outerHTML = '<img id="camp_cover_preview" src="'+url+'" style="width:120px;height:68px;object-fit:cover;border-radius:8px;border:1px solid var(--g200)">';
        } else if(prevNow) {
          console.log('Updating existing preview image');
          prevNow.src = url;
          prevNow.style.opacity = '1';
          prevNow.style.filter = 'none';
          prevNow.style.display = '';
        } else {
          console.log('Creating new preview image');
          area.innerHTML = '<img id="camp_cover_preview" src="'+url+'" style="width:120px;height:68px;object-fit:cover;border-radius:8px;border:1px solid var(--g200)"> <button type="button" class="btn btn-out btn-sm" style="color:var(--err);border-color:#FEE2E2" onclick="clearCampCover()">移除</button>';
        }
        
        toast('✅ 封面已上传成功','ok');
      } else {
        console.error('Upload failed:', data.msg);
        toast('❌ 上传失败: '+(data.msg||'未知错误'),'err');
        if(ph) ph.innerHTML = '+';
        if(prev) { prev.style.opacity = '1'; prev.style.filter = 'none'; prev.style.display = ''; }
      }
    })
    .catch(function(e){
      console.error('Upload error:', e);
      var msg = '❌ 上传失败: ';
      if(e.message && (e.message.indexOf('fetch')>=0 || e.message.indexOf('Failed to fetch')>=0)){
        msg += '无法连接到服务器\n请确认：\n1. 已双击 start-server.bat\n2. 通过 http://localhost:3000 访问本页面';
      } else {
        msg += e.message || '未知错误';
      }
      toast(msg,'err');
      if(ph) ph.innerHTML = '+';
      if(prev) { prev.style.opacity = '1'; prev.style.filter = 'none'; prev.style.display = ''; }
    });
  
  input.value = '';
  console.log('=== handleCampCoverChange end ===');
}

function clearCampCover(){
  document.getElementById('camp_cover').value = '';
  var prev = document.getElementById('camp_cover_preview');
  var area = document.getElementById('camp_cover_area');
  if(prev) prev.outerHTML = '<div id="camp_cover_placeholder" style="width:120px;height:68px;border:2px dashed var(--g300);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--g400);font-size:24px;flex-shrink:0">+</div>';
  var btns = area.querySelectorAll('button');
  btns.forEach(function(b){ if(b.textContent==='移除') b.remove(); });
}

function saveCampArticle(){
  var title=(document.getElementById('camp_title').value||'').trim();
  if(!title){toast('请填写培训标题','err');document.getElementById('camp_title').focus();return}

  var article={
    id: _editingId===null ? nextCampId() : _editingId,
    title: title,
    excerpt: (document.getElementById('camp_excerpt').value||'').trim(),
    cat:    document.getElementById('camp_cat').value||'all',
    date:   document.getElementById('camp_date').value||'',
    days:   parseInt(document.getElementById('camp_days').value)||0,
    location: (document.getElementById('camp_location').value||'').trim(),
    people:   parseInt(document.getElementById('camp_people').value)||0,
    cover:    (document.getElementById('camp_cover').value||'').trim(),
    content:  normalizeContentUrls(document.getElementById('camp_content').value||''),
    top:      document.getElementById('camp_top').checked,
    updatedAt: new Date().toISOString(),
  };

  var list=getCampArticles();
  if(_editingId===null){
    article.createdAt=article.updatedAt;
    list.push(article);
  } else {
    var idx=list.findIndex(function(a){return a.id===_editingId});
    if(idx>=0){article.createdAt=list[idx].createdAt;list[idx]=article}
    else{article.createdAt=article.updatedAt;list.push(article)}
  }
  saveCampArticles(list);
  closeCampEditor();
  toast(_editingId===null?'✅ 已发布！':'✅ 已更新！','ok');
  renderCampTab();
}

function deleteCampArticle(id){
  if(!confirm('确定删除这条培训记录？此操作不可恢复。'))return;
  var list=getCampArticles().filter(function(a){return a.id!==id});
  saveCampArticles(list);
  toast('已删除','info');
  renderCampTab();
}

// ── Init ──
init();
</script>
