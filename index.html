<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>卡泰驰培训中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F5F6FA;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif}
.loader{text-align:center}
.loader .brand{font-size:28px;font-weight:800;color:#1A1A2E;letter-spacing:1px}
.loader .brand .accent{color:#F5A623}
.loader .dot{width:4px;height:4px;background:#F5A623;border-radius:50%;margin:8px auto}
.loader p{color:#999AAA;font-size:14px;margin-top:12px}
.spinner{width:32px;height:32px;border:3px solid #E8E8EF;border-top-color:#F5A623;border-radius:50%;animation:spin .8s linear infinite;margin:24px auto 0}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loader">
  <div class="brand">卡泰驰<span class="accent">培训中心</span></div>
  <div class="dot"></div>
  <p>正在进入...</p>
  <div class="spinner"></div>
</div>
<script>
(function(){
  try{
    var u=JSON.parse(localStorage.getItem('kataichi_user'));
    if(u&&u.name&&u.store&&u.position){
      u.lastActive=new Date().toISOString();
      localStorage.setItem('kataichi_user',JSON.stringify(u));
      location.replace('portal_v2.html');
    }else{
      location.replace('login.html');
    }
  }catch(e){
    location.replace('login.html');
  }
})();
</script>
</body>
</html>
