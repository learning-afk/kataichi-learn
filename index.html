<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>卡泰驰培训中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F5F6FA;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif}
.loader{text-align:center}
.loader .logo{width:64px;height:64px;background:linear-gradient(135deg,#F5A623,#FFB84D);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 20px;box-shadow:0 4px 16px rgba(245,166,35,.25)}
.loader p{color:#666680;font-size:14px}
.loader .brand{font-size:20px;font-weight:700;color:#1A1A2E;margin-bottom:8px}
.spinner{width:32px;height:32px;border:3px solid #E8E8EF;border-top-color:#F5A623;border-radius:50%;animation:spin .8s linear infinite;margin:16px auto 0}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loader">
  <div class="logo">📚</div>
  <div class="brand">卡泰驰培训中心</div>
  <p>正在进入...</p>
  <div class="spinner"></div>
</div>
<script>
(function(){
  try{
    var u=JSON.parse(localStorage.getItem('kataichi_user'));
    if(u&&u.name&&u.store&&u.position){
      u.lastActive=new Date().toISOString();
      localStorage.setItem('kataichi_user',JSON.stringify(u));
      location.replace('portal_v2.html');
    }else{
      location.replace('login.html');
    }
  }catch(e){
    location.replace('login.html');
  }
})();
</script>
</body>
</html>
