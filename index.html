<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>卡泰驰培训中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060b14;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.loader{text-align:center}
.loader img{width:80px;height:80px;margin-bottom:20px}
.loader p{color:rgba(255,255,255,.6);font-size:14px}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.1);border-top-color:#d4af37;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loader">
  <div class="spinner"></div>
  <p>正在进入卡泰驰培训中心...</p>
</div>
<script>
(function(){
  try{
    var u=JSON.parse(localStorage.getItem('kataichi_user'));
    if(u&&u.name&&u.store&&u.position){
      // 已完整登记 → 更新活跃时间，直接进入
      u.lastActive=new Date().toISOString();
      localStorage.setItem('kataichi_user',JSON.stringify(u));
      location.replace('portal_v2.html');
    }else{
      // 未登记 → 跳转登录页
      location.replace('login.html');
    }
  }catch(e){
    location.replace('login.html');
  }
})();
</script>
</body>
</html>
